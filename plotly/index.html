<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plotly 动态折线图 (修复版)</title>
    <!-- 使用可靠的 plotly.js CDN，并添加备用版本 -->
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <style>
        /* (样式与之前相同，略作精简) */
        * { box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f5f7fb; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .card { background: white; max-width: 1200px; width: 100%; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); padding: 28px 32px; }
        h2 { margin-top: 0; margin-bottom: 6px; font-weight: 500; color: #1a2639; }
        .sub { color: #4a5568; font-size: 0.95rem; margin-bottom: 24px; border-left: 4px solid #3b82f6; padding-left: 16px; background: #f8fafc; border-radius: 0 8px 8px 0; }
        textarea { width: 100%; height: 200px; padding: 18px; font-family: monospace; font-size: 14px; background: #1e293b; color: #e2e8f0; border: 2px solid #334155; border-radius: 18px; resize: vertical; }
        textarea:focus { border-color: #3b82f6; outline: none; }
        .button-bar { display: flex; flex-wrap: wrap; gap: 12px; margin: 16px 0; }
        .btn { background: white; border: 1px solid #cbd5e1; padding: 10px 24px; border-radius: 40px; font-weight: 500; cursor: pointer; }
        .btn-primary { background: #1e293b; color: white; border-color: #1e293b; }
        .btn-primary:hover { background: #0f172a; }
        .error-message { background: #fee2e2; border: 1px solid #f87171; color: #991b1b; padding: 12px 18px; border-radius: 40px; display: flex; align-items: center; gap: 12px; margin: 8px 0; }
        .error-message.hidden { display: none; }
        #chart { width: 100%; height: 500px; border-radius: 20px; border: 1px solid #e9edf2; background: #fefefe; margin-top: 20px; }
        .footer-note { margin-top: 20px; text-align: right; font-size: 0.85rem; color: #64748b; }
    </style>
</head>
<body>
<div class="card">
    <h2>📈 多折线 · 索引即X轴</h2>
    <div class="sub">
        输入对象数组 <code>[{item1: value, item2: value}, ...]</code>，每个键为一条折线，数组索引为X轴。
    </div>

    <textarea id="jsonInput" placeholder='示例：[{"sales":12, "cost":5}, {"sales":19, "cost":8}]'>[
  {"visits": 120, "conversions": 12, "revenue": 340},
  {"visits": 135, "conversions": 15, "revenue": 410},
  {"visits": 142, "conversions": 14, "revenue": 398},
  {"visits": 158, "conversions": 20, "revenue": 590},
  {"visits": 175, "conversions": 22, "revenue": 670}
]</textarea>

    <div class="button-bar">
        <button class="btn btn-primary" id="drawBtn">🎨 绘制图表</button>
        <button class="btn" id="resetExampleBtn">↻ 恢复示例</button>
    </div>

    <div id="errorBox" class="error-message hidden">
        <span id="errorText"></span>
    </div>

    <div id="chart"></div>
    <div class="footer-note">⚡ 缺失值显示为断点 · 使用 Plotly.js 渲染</div>
</div>

<script>
    (function() {
        // 获取元素
        const textarea = document.getElementById('jsonInput');
        const drawBtn = document.getElementById('drawBtn');
        const resetBtn = document.getElementById('resetExampleBtn');
        const errorBox = document.getElementById('errorBox');
        const errorText = document.getElementById('errorText');
        const chartDiv = document.getElementById('chart');

        // 示例数据（与textarea默认一致）
        const EXAMPLE_JSON = `[
  {"visits": 120, "conversions": 12, "revenue": 340},
  {"visits": 135, "conversions": 15, "revenue": 410},
  {"visits": 142, "conversions": 14, "revenue": 398},
  {"visits": 158, "conversions": 20, "revenue": 590},
  {"visits": 175, "conversions": 22, "revenue": 670}
]`;

        // 辅助函数：隐藏错误
        function hideError() {
            errorBox.classList.add('hidden');
        }

        // 显示错误
        function showError(msg) {
            errorText.textContent = msg || '未知错误';
            errorBox.classList.remove('hidden');
            console.error('[Plotly Error]', msg);
        }

        // 核心绘图函数 (始终使用 newPlot 重新创建，避免状态残留)
        function drawFromJSON(jsonString) {
            hideError();

            // 1. 检查 Plotly 是否加载
            if (typeof Plotly === 'undefined') {
                showError('Plotly 库未加载，请检查网络或刷新重试。');
                return;
            }

            // 2. 解析 JSON
            let data;
            try {
                data = JSON.parse(jsonString);
            } catch (e) {
                showError('JSON 解析失败: ' + e.message);
                return;
            }

            // 3. 验证为数组
            if (!Array.isArray(data)) {
                showError('输入必须是数组');
                return;
            }
            if (data.length === 0) {
                showError('数组不能为空');
                return;
            }

            // 4. 验证每个元素为简单对象
            for (let i = 0; i < data.length; i++) {
                const item = data[i];
                if (typeof item !== 'object' || item === null || Array.isArray(item)) {
                    showError(`索引 ${i} 的元素不是普通对象`);
                    return;
                }
            }

            // 5. 提取所有键名（折线名称）
            const keysSet = new Set();
            data.forEach(obj => Object.keys(obj).forEach(k => keysSet.add(k)));
            if (keysSet.size === 0) {
                showError('对象中未找到任何键');
                return;
            }
            const keys = Array.from(keysSet);

            // 6. 准备 X 轴 (数组索引)
            const indices = data.map((_, idx) => idx);

            // 7. 构建 traces
            const traces = keys.map(key => {
                const yValues = data.map(obj => obj.hasOwnProperty(key) ? obj[key] : null);
                return {
                    name: key,
                    type: 'scatter',
                    mode: 'lines+markers',
                    x: indices,
                    y: yValues,
                    line: { width: 2.5 },
                    marker: { size: 6 },
                    connectgaps: false  // 断开 null 值
                };
            });

            // 8. 布局设置
            const layout = {
                title: '多折线图 (索引为X轴)',
                xaxis: { 
                    title: '数组索引', 
                    tickmode: 'linear', 
                    tick0: 0, 
                    dtick: 1,
                    showgrid: true 
                },
                yaxis: { title: '数值', showgrid: true },
                hovermode: 'x unified',
                legend: { orientation: 'h', y: -0.2, x: 0.5, xanchor: 'center' },
                margin: { t: 50, b: 80, l: 60, r: 40 },
                plot_bgcolor: '#fcfdff'
            };

            // 9. 使用 newPlot 完全重新绘图（简单可靠）
            Plotly.newPlot(chartDiv, traces, layout, { responsive: true })
                .catch(err => {
                    console.warn('Plotly.newPlot 错误:', err);
                    showError('绘图时发生内部错误，请检查数值类型');
                });
        }

        // 事件绑定
        drawBtn.addEventListener('click', () => drawFromJSON(textarea.value));
        resetBtn.addEventListener('click', () => {
            textarea.value = EXAMPLE_JSON;
            drawFromJSON(EXAMPLE_JSON);
        });

        // 支持 Ctrl+Enter 快捷键
        textarea.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                drawFromJSON(textarea.value);
            }
        });

        // 页面加载后立即绘制示例
        window.addEventListener('load', () => {
            drawFromJSON(textarea.value);
        });

        // 额外：如果用户修改输入，清除旧错误（可选）
        textarea.addEventListener('input', hideError);
    })();
</script>
</body>
</html>
