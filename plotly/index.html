<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plotly 流式加载 · 可滚动容器 · 平移缩放</title>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        body {
            background: #f1f5f9;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: #ffffff;
            max-width: 1300px;
            width: 100%;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 32px 36px;
        }
        h2 {
            margin: 0 0 8px 0;
            font-weight: 600;
            font-size: 1.9rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #0f172a, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sub {
            color: #334155;
            font-size: 1rem;
            margin-bottom: 28px;
            padding-left: 20px;
            border-left: 6px solid #3b82f6;
            background: #f8fafc;
            border-radius: 0 12px 12px 0;
            line-height: 1.6;
            padding: 12px 20px;
        }
        .sub code {
            background: #e2e8f0;
            padding: 4px 8px;
            border-radius: 10px;
            font-size: 0.9em;
            color: #0f172a;
        }
        textarea {
            width: 100%;
            height: 250px;
            padding: 22px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.6;
            background: #0f172a;
            color: #e2e8f0;
            border: 2px solid #334155;
            border-radius: 24px;
            resize: vertical;
            outline: none;
            transition: 0.2s;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.6);
        }
        textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59,130,246,0.3), inset 0 2px 8px #000;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin: 24px 0 16px;
            align-items: center;
        }
        .btn {
            background: white;
            border: 1px solid #cbd5e1;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #1e293b;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 4px 6px -2px rgba(0,0,0,0.05);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: #1e293b;
            border-color: #1e293b;
            color: white;
            box-shadow: 0 12px 20px -10px #1e293b80;
        }
        .btn-primary:hover {
            background: #0f172a;
            transform: scale(1.02);
        }
        .btn:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }
        .error-banner {
            background: #fee2e2;
            border: 2px solid #ef4444;
            color: #7f1d1d;
            padding: 14px 22px;
            border-radius: 60px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 16px 0 20px;
            box-shadow: 0 6px 12px -8px #ef4444;
        }
        .error-banner.hidden {
            display: none;
        }
        /* 可滚动容器 */
        .chart-container {
            width: 100%;
            height: 600px;
            overflow: auto;
            border: 2px solid #e2e8f0;
            border-radius: 24px;
            background: #fcfdff;
            margin-top: 25px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.05);
        }
        #chart {
            width: 100%;
            height: 100%;
            min-width: 100%; /* 保证至少填满容器宽度，但内部绘图宽度由 layout.width 决定 */
        }
        .stats {
            margin-top: 18px;
            font-size: 0.9rem;
            color: #475569;
            display: flex;
            gap: 24px;
            align-items: center;
            flex-wrap: wrap;
            background: #f1f4f9;
            padding: 12px 24px;
            border-radius: 60px;
        }
        .badge {
            background: #d9e2ef;
            color: #1e293b;
            border-radius: 40px;
            padding: 4px 16px;
            font-weight: 500;
            font-size: 0.85rem;
        }
        .progress {
            background: #2563eb;
            color: white;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .footer-note {
            margin-top: 20px;
            text-align: right;
            font-size: 0.9rem;
            color: #62748c;
            border-top: 1px dashed #cbd5e1;
            padding-top: 18px;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>🌊 流式加载 · 可滚动容器 · 平移缩放</h2>
    <div class="sub">
        输入深层嵌套数组，支持任意深度。数据点超过500时启用<strong>流式分块加载</strong>，避免界面卡顿。<br>
        拖拽平移 <code>dragmode: pan</code> · 滚轮/触屏缩放 · 双击复位 · 图表宽度自适应点间距 (≈30px/点)，超出容器可滚动。
    </div>

    <textarea id="jsonInput" placeholder='例如：[{"a":1,"b":{"c":2}}, ...]'>[
  {
    "time": "2025-01",
    "metrics": {
      "cpu": 12.5,
      "memory": 1024,
      "disk": {
        "used": 450,
        "free": 550
      }
    },
    "tags": ["prod", "web"]
  },
  {
    "time": "2025-02",
    "metrics": {
      "cpu": 14.2,
      "memory": 1150,
      "disk": {
        "used": 500,
        "free": 500
      }
    },
    "tags": ["prod", "web"]
  },
  {
    "time": "2025-03",
    "metrics": {
      "cpu": 11.8,
      "memory": 1080,
      "disk": {
        "used": 530,
        "free": 470
      }
    },
    "tags": ["prod", "web"]
  },
  {
    "time": "2025-04",
    "metrics": {
      "cpu": 17.3,
      "memory": 1220,
      "disk": {
        "used": 620,
        "free": 380
      }
    },
    "tags": ["prod", "web"]
  }
]</textarea>

    <div class="toolbar">
        <button class="btn btn-primary" id="drawBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M12 22V12"/><path d="M3.3 7 12 12l8.7-5"/><path d="M12 22v-5"/></svg>
            绘制 / 流式加载
        </button>
        <button class="btn" id="resetExampleBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9"/><path d="M3 3v6h6"/></svg>
            恢复示例
        </button>
        <button class="btn" id="genLargeBtn">
            🌊 生成大测试数据 (2000点)
        </button>
        <span class="badge">✨ 流式分块 · 可滚动</span>
    </div>

    <div id="errorBanner" class="error-banner hidden">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="errorMessage"></span>
    </div>

    <!-- 可滚动容器 -->
    <div class="chart-container" id="chartContainer">
        <div id="chart"></div>
    </div>

    <div class="stats" id="statsPanel">
        <span>📊 等待绘图…</span>
    </div>

    <div class="footer-note">
        ⚡ 流式阈值 500 点 · 每批 500 点 · 最终宽度 = max(容器宽度, 点数×30) · 容器内可横向/纵向滚动
    </div>
</div>

<script>
    (function() {
        // DOM 元素
        const textarea = document.getElementById('jsonInput');
        const drawBtn = document.getElementById('drawBtn');
        const resetBtn = document.getElementById('resetExampleBtn');
        const genLargeBtn = document.getElementById('genLargeBtn');
        const errorBanner = document.getElementById('errorBanner');
        const errorSpan = document.getElementById('errorMessage');
        const chartContainer = document.getElementById('chartContainer');
        const chartDiv = document.getElementById('chart');
        const statsPanel = document.getElementById('statsPanel');

        // 示例数据 (保持不变)
        const EXAMPLE_JSON = `[
  {
    "time": "2025-01",
    "metrics": {
      "cpu": 12.5,
      "memory": 1024,
      "disk": {
        "used": 450,
        "free": 550
      }
    },
    "tags": ["prod", "web"]
  },
  {
    "time": "2025-02",
    "metrics": {
      "cpu": 14.2,
      "memory": 1150,
      "disk": {
        "used": 500,
        "free": 500
      }
    },
    "tags": ["prod", "web"]
  },
  {
    "time": "2025-03",
    "metrics": {
      "cpu": 11.8,
      "memory": 1080,
      "disk": {
        "used": 530,
        "free": 470
      }
    },
    "tags": ["prod", "web"]
  },
  {
    "time": "2025-04",
    "metrics": {
      "cpu": 17.3,
      "memory": 1220,
      "disk": {
        "used": 620,
        "free": 380
      }
    },
    "tags": ["prod", "web"]
  }
]`;

        // 常量
        const BATCH_SIZE = 500;                // 每批处理点数
        const STREAM_THRESHOLD = 500;           // 超过此值启用流式
        const POINT_SPACING = 30;               // 目标点间距(px)

        // 全局流式控制
        let currentStreaming = { cancel: false, timeoutId: null };

        // 辅助：隐藏错误
        function hideError() {
            errorBanner.classList.add('hidden');
        }

        // 显示错误
        function showError(msg) {
            errorSpan.textContent = msg;
            errorBanner.classList.remove('hidden');
            console.error('[绘图错误]', msg);
        }

        // 更新统计/进度
        function updateStats(seriesCount, pointCount, paths, progressText = '') {
            let html = '';
            if (seriesCount && pointCount) {
                html = `<span>📈 折线数量：<strong>${seriesCount}</strong> 条 &nbsp;·&nbsp; 数据点数量：<strong>${pointCount}</strong> 个索引</span>`;
                if (paths) {
                    const examples = paths.slice(0, 3).join(' · ');
                    html += `<span style="margin-left:auto;">🔖 路径示例：${examples}${paths.length > 3 ? ' …' : ''}</span>`;
                }
                if (progressText) {
                    html += `<span class="progress">⏳ ${progressText}</span>`;
                }
            } else {
                html = `<span>📊 ${progressText || '等待绘图…'}</span>`;
            }
            statsPanel.innerHTML = html;
        }

        // 递归提取叶节点路径 (用于收集所有路径)
        function collectLeafPaths(obj, prefix = '', set = new Set()) {
            if (obj === null || typeof obj !== 'object') {
                if (prefix) set.add(prefix); // 基本类型叶节点
                return set;
            }
            if (Array.isArray(obj)) {
                if (obj.length === 0) return set; // 空数组忽略
                for (let i = 0; i < obj.length; i++) {
                    const newPrefix = prefix ? `${prefix}.[${i}]` : `[${i}]`;
                    collectLeafPaths(obj[i], newPrefix, set);
                }
                return set;
            }
            for (const [key, value] of Object.entries(obj)) {
                const newPrefix = prefix ? `${prefix}.${key}` : key;
                if (value !== null && typeof value === 'object') {
                    collectLeafPaths(value, newPrefix, set);
                } else {
                    set.add(newPrefix);
                }
            }
            return set;
        }

        // 从对象中根据路径提取值 (路径如 "a.b.c" 或 "tags.[0]")
        function getValueByPath(obj, path) {
            const parts = path.split(/\.|(?=\[)/); // 简单分割，处理点号和左括号
            let current = obj;
            for (let part of parts) {
                if (part.startsWith('[')) {
                    // 数组索引，如 "[0]"
                    const idx = parseInt(part.slice(1, -1), 10);
                    if (Array.isArray(current) && idx >= 0 && idx < current.length) {
                        current = current[idx];
                    } else {
                        return null;
                    }
                } else {
                    if (current && typeof current === 'object' && part in current) {
                        current = current[part];
                    } else {
                        return null;
                    }
                }
            }
            return current;
        }

        // 将值转为数字或null
        function toNumber(val) {
            if (typeof val === 'number') return val;
            if (typeof val === 'string' && !isNaN(Number(val))) return Number(val);
            if (val === null) return null;
            return null; // 其他情况转为null
        }

        // 取消当前流式任务
        function cancelStreaming() {
            if (currentStreaming.timeoutId) {
                clearTimeout(currentStreaming.timeoutId);
                currentStreaming.timeoutId = null;
            }
            currentStreaming.cancel = true;
        }

        // 流式绘图
        function streamPlot(data, paths, containerWidth, containerHeight) {
            const N = data.length;
            const finalWidth = Math.max(containerWidth, N * POINT_SPACING);
            const traceCount = paths.length;

            // 创建空traces
            const traces = paths.map(p => ({
                name: p,
                type: 'scatter',
                mode: 'lines+markers',
                x: [],
                y: [],
                line: { width: 2.2 },
                marker: { size: 5, opacity: 0.8 },
                connectgaps: false
            }));

            // 布局: 启用平移、缩放、双击复位
            const layout = {
                title: '流式加载中...',
                dragmode: 'pan',
                scrollZoom: true,
                doubleClick: 'reset',
                width: finalWidth,
                height: containerHeight,
                xaxis: {
                    title: '数组索引',
                    tickmode: 'linear',
                    tick0: 0,
                    dtick: 1,
                    showgrid: true,
                    gridcolor: '#e2e8f0'
                },
                yaxis: {
                    title: '数值',
                    showgrid: true,
                    gridcolor: '#e2e8f0'
                },
                hovermode: 'x unified',
                legend: { orientation: 'h', y: -0.25, x: 0.5, xanchor: 'center', font: { size: 10 } },
                margin: { t: 50, b: 100, l: 60, r: 40 },
                plot_bgcolor: '#fcfdff',
                paper_bgcolor: '#ffffff'
            };

            // 清空并绘制初始图表
            Plotly.newPlot(chartDiv, traces, layout, { responsive: false })
                .then(() => {
                    // 开始分批追加
                    let start = 0;
                    const totalPoints = N;
                    updateStats(traceCount, 0, paths, `0/${totalPoints}`);

                    const processBatch = () => {
                        if (currentStreaming.cancel) return;

                        const end = Math.min(start + BATCH_SIZE, totalPoints);
                        const batchIndices = Array.from({ length: end - start }, (_, i) => start + i);

                        // 准备 xBatch (所有trace共享相同的x值)
                        const xBatch = batchIndices; // 每个trace都追加这些索引

                        // 准备 yBatch: 二维数组 [traceIndex][pointIndex]
                        const yBatch = paths.map(() => []);

                        // 遍历当前批次的每个数据点
                        for (let i = start; i < end; i++) {
                            const obj = data[i];
                            // 对每个路径提取值
                            paths.forEach((path, traceIdx) => {
                                const rawVal = getValueByPath(obj, path);
                                const numVal = toNumber(rawVal);
                                yBatch[traceIdx].push(numVal);
                            });
                        }

                        // 构建 extend 参数: 为每个trace提供x和y
                        const extendData = {
                            x: paths.map(() => xBatch),   // 每个trace的x新值相同
                            y: yBatch
                        };
                        const traceIndices = paths.map((_, idx) => idx);

                        Plotly.extendTraces(chartDiv, extendData, traceIndices)
                            .then(() => {
                                start = end;
                                updateStats(traceCount, start, paths, `${start}/${totalPoints}`);

                                if (start < totalPoints) {
                                    // 继续下一批
                                    currentStreaming.timeoutId = setTimeout(processBatch, 0);
                                } else {
                                    // 完成
                                    currentStreaming.timeoutId = null;
                                    updateStats(traceCount, totalPoints, paths);
                                    // 可再次确保宽度正确 (但已在布局中设定)
                                    Plotly.relayout(chartDiv, { title: '深层嵌套折线图 (流式加载完成)' });
                                }
                            })
                            .catch(err => {
                                console.error('extendTraces 出错', err);
                                showError('追加数据时出错，请重试');
                                currentStreaming.cancel = true;
                            });
                    };

                    // 启动第一批
                    currentStreaming.timeoutId = setTimeout(processBatch, 0);
                })
                .catch(err => {
                    console.error('newPlot 初始化失败', err);
                    showError('图表初始化失败');
                });
        }

        // 一次性绘图 (数据量小)
        function plotSync(data, paths, containerWidth, containerHeight) {
            const N = data.length;
            const finalWidth = Math.max(containerWidth, N * POINT_SPACING);
            const indices = Array.from({ length: N }, (_, i) => i);

            const traces = paths.map(path => {
                const yValues = data.map(obj => {
                    const val = getValueByPath(obj, path);
                    return toNumber(val);
                });
                return {
                    name: path,
                    type: 'scatter',
                    mode: 'lines+markers',
                    x: indices,
                    y: yValues,
                    line: { width: 2.2 },
                    marker: { size: 5, opacity: 0.8 },
                    connectgaps: false
                };
            });

            const layout = {
                title: '深层嵌套折线图',
                dragmode: 'pan',
                scrollZoom: true,
                doubleClick: 'reset',
                width: finalWidth,
                height: containerHeight,
                xaxis: { title: '数组索引', tickmode: 'linear', tick0: 0, dtick: 1, showgrid: true, gridcolor: '#e2e8f0' },
                yaxis: { title: '数值', showgrid: true, gridcolor: '#e2e8f0' },
                hovermode: 'x unified',
                legend: { orientation: 'h', y: -0.25, x: 0.5, xanchor: 'center', font: { size: 10 } },
                margin: { t: 50, b: 100, l: 60, r: 40 },
                plot_bgcolor: '#fcfdff',
                paper_bgcolor: '#ffffff'
            };

            Plotly.newPlot(chartDiv, traces, layout, { responsive: false })
                .then(() => {
                    updateStats(traces.length, N, paths);
                })
                .catch(err => {
                    console.error('同步绘图失败', err);
                    showError('绘图时出错');
                });
        }

        // 主绘图函数
        function drawFromJSON(jsonString) {
            hideError();
            cancelStreaming(); // 取消任何进行中的流式任务

            if (typeof Plotly === 'undefined') {
                showError('Plotly 库未加载，请刷新页面');
                return;
            }

            let rawData;
            try {
                rawData = JSON.parse(jsonString);
            } catch (e) {
                showError('JSON 解析失败: ' + e.message);
                return;
            }

            if (!Array.isArray(rawData)) {
                showError('输入必须是数组');
                return;
            }
            if (rawData.length === 0) {
                showError('数组不能为空');
                return;
            }

            // 预处理：将基本类型元素包装为 { value: 元素 }
            const data = rawData.map((item, idx) => {
                if (item === null || (typeof item !== 'object' && !Array.isArray(item))) {
                    console.warn(`索引 ${idx} 的元素是基本类型，已自动包装为 { "value": ${item} }`);
                    return { value: item };
                }
                return item;
            });

            // 收集所有叶节点路径
            const pathsSet = new Set();
            data.forEach(obj => collectLeafPaths(obj, '', pathsSet));
            if (pathsSet.size === 0) {
                showError('未找到任何叶节点，无法绘图');
                return;
            }
            const paths = Array.from(pathsSet).sort();

            // 获取容器尺寸
            const containerWidth = chartContainer.clientWidth;
            const containerHeight = chartContainer.clientHeight;

            // 根据数据量决定是否流式
            if (data.length > STREAM_THRESHOLD) {
                updateStats(0, 0, [], `准备流式加载 ${data.length} 点...`);
                // 先清除现有图表
                Plotly.purge(chartDiv);
                streamPlot(data, paths, containerWidth, containerHeight);
            } else {
                plotSync(data, paths, containerWidth, containerHeight);
            }
        }

        // 生成大测试数据 (2000点)
        function generateLargeTestData() {
            const base = [];
            for (let i = 0; i < 2000; i++) {
                base.push({
                    index: i,
                    metrics: {
                        cpu: 20 + Math.sin(i / 50) * 10 + Math.random() * 2,
                        memory: 1024 + Math.sin(i / 30) * 200,
                        disk: {
                            used: 400 + Math.sin(i / 20) * 150,
                            free: 600 - Math.sin(i / 20) * 150
                        }
                    },
                    tags: ["test", i % 2 === 0 ? "even" : "odd"]
                });
            }
            textarea.value = JSON.stringify(base, null, 2);
        }

        // 事件绑定
        drawBtn.addEventListener('click', () => drawFromJSON(textarea.value));
        resetBtn.addEventListener('click', () => {
            textarea.value = EXAMPLE_JSON;
            drawFromJSON(EXAMPLE_JSON);
        });
        genLargeBtn.addEventListener('click', () => {
            generateLargeTestData();
            drawFromJSON(textarea.value);
        });

        // Ctrl+Enter 快捷键
        textarea.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                drawFromJSON(textarea.value);
            }
        });

        textarea.addEventListener('input', hideError);

        // 窗口大小改变时，可以重新计算宽度？简单起见，用户可手动重新绘制。
        // 但我们可以监听 resize 并提示（非必须）

        // 页面加载后立即绘制示例
        window.addEventListener('load', () => {
            drawFromJSON(textarea.value);
        });

        // 清理流式
        window.addEventListener('beforeunload', () => {
            cancelStreaming();
        });
    })();
</script>
</body>
</html>
