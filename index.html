<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍞 SugarCube 存档编辑器 · 性能优化版</title>
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsonpath-plus@6.0.1/dist/index-browser-esm.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f4f3f0;
            padding: 1.5rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .editor-container {
            max-width: 1300px;
            width: 100%;
            background: #fefcf7;
            border-radius: 28px;
            box-shadow: 0 25px 40px -12px rgba(40, 30, 10, 0.3);
            padding: 2rem 2rem 4rem 2rem;
            position: relative;
        }
        h1 {
            font-weight: 500;
            font-size: 2.2rem;
            letter-spacing: -0.5px;
            color: #3a2e28;
            margin-bottom: 1.5rem;
            border-left: 6px solid #b87c5a;
            padding-left: 1.3rem;
        }

        /* base64 行 */
        .base64-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-bottom: 0.8rem;
            align-items: center;
        }
        .btn {
            background: #eae3da;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #3a2e28;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            transition: 0.15s;
            border: 1px solid transparent;
        }
        .btn:hover {
            background: #d9cdbf;
            border-color: #c1a58b;
        }
        .btn-file {
            background: #dbd0c2;
            position: relative;
            display: inline-block;
        }
        .btn-file input {
            position: absolute;
            left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer;
        }
        .base64-textarea {
            width: 100%;
            padding: 1rem;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.85rem;
            background: #f6f3ef;
            border: 1px solid #d9cfc0;
            border-radius: 24px;
            margin-bottom: 1.8rem;
            resize: vertical;
            min-height: 100px;
            color: #2b221c;
            outline: none;
            transition: 0.1s;
            box-shadow: inset 2px 2px 6px rgba(0,0,0,0.02);
        }
        .base64-textarea:focus {
            border-color: #b87c5a;
            background: #fffcf8;
        }

        /* 节点编辑面板 */
        .node-edit-panel {
            background: #ece3d9;
            border-radius: 40px;
            padding: 1rem 1.5rem;
            margin: 1rem 0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
        }
        .panel-buttons {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .node-edit-textarea {
            flex: 2 1 300px;
            padding: 0.8rem 1.2rem;
            font-family: 'Monaco', monospace;
            font-size: 0.8rem;
            background: #fcf9f4;
            border: 1px solid #c9b6a2;
            border-radius: 36px;
            resize: vertical;
            min-height: 70px;
        }
        .help-icon {
            background: #cbb59e;
            border-radius: 50%;
            width: 1.8rem;
            height: 1.8rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            margin-left: 0.2rem;
        }

        /* 搜索面板 */
        .search-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
            background: #ece5db;
            padding: 0.6rem 1.2rem;
            border-radius: 60px;
            margin: 1rem 0 0.8rem;
        }
        .search-wrapper {
            flex: 3 1 250px;
            display: flex;
            background: white;
            border-radius: 40px;
            border: 1px solid #cfbfad;
            overflow: hidden;
        }
        .search-input {
            flex: 1;
            padding: 0.6rem 1.2rem;
            border: none;
            outline: none;
            font-size: 0.9rem;
        }
        .jsonpath-toggle {
            background: #d9caba;
            border: none;
            padding: 0 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .search-btn {
            background: #cab89e;
            border: none;
            border-radius: 40px;
            padding: 0.6rem 1.4rem;
            font-weight: 600;
            color: #2e241d;
        }
        .match-indicator {
            background: #ddcfbe;
            padding: 0.2rem 1rem;
            border-radius: 36px;
            font-size: 0.9rem;
            font-weight: 500;
            min-width: 70px;
            text-align: center;
        }
        .nav-arrow {
            background: none;
            border: 1px solid #b29e88;
            font-size: 1.2rem;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            cursor: pointer;
        }

        /* 黑白名单工具栏 */
        .filter-toolbar {
            background: #e8dfd2;
            padding: 0.7rem 1.5rem;
            border-radius: 60px;
            margin: 0.5rem 0 1rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.8rem 1.2rem;
            font-size: 0.95rem;
        }
        .filter-label { font-weight: 500; color: #4f3f33; }
        .filter-btn {
            background: #dbcdbc;
            border: none;
            border-radius: 40px;
            padding: 0.4rem 1.2rem;
            font-size: 0.9rem;
            cursor: pointer;
            border: 1px solid #c5af99;
        }
        .filter-btn.active { background: #b87c5a; color: white; border-color: #9b6243; }
        .mode-toggle { background: #cbb59e; font-weight: 600; min-width: 130px; }
        .clear-btn { background: #ccb7a2; }

        /* 面包屑 */
        .breadcrumb {
            background: #e2d7cb;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            margin: 0.8rem 0 1rem;
            font-size: 0.95rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem 0.6rem;
            color: #4f3f33;
        }
        .crumb-item {
            cursor: pointer;
            padding: 0.1rem 0.5rem;
            border-radius: 30px;
            background: #f2ece3;
        }
        .crumb-item:hover { background: #d4bfab; }

        /* json树 */
        .json-tree {
            background: #fbf9f5;
            border: 1px solid #ddd2c2;
            border-radius: 32px;
            padding: 1.5rem 1.2rem;
            overflow: auto;
            max-height: 500px;
            box-shadow: inset 0 0 0 1px rgba(255,250,240,0.8);
            scroll-behavior: smooth;
        }
        .tree-node {
            margin-left: 1.4rem;
            list-style: none;
        }
        .tree-node ul { padding-left: 1.4rem; margin: 0.2rem 0; list-style: none; }
        .node-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0.2rem 0.1rem;
            border-radius: 30px;
            cursor: default;
            white-space: nowrap;
            width: 100%;
            box-sizing: border-box;
        }
        .node-row.current-node {
            background: #efe4d7;
            outline: 1px solid #c9aa8b;
            /* 确保背景从左边距开始 */
            margin-left: -0.1rem; /* 微调对齐 */
            padding-left: calc(0.1rem + 0.1rem); /* 补偿 */
        }
        .toggle {
            width: 1.2rem;
            display: inline-block;
            cursor: pointer;
            font-size: 0.9rem;
            color: #8b6f58;
            user-select: none;
        }
        .key {
            font-weight: 600;
            color: #684e3a;
            cursor: pointer;
        }
        .colon { margin-right: 4px; }
        .value-block {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .value-edit {
            background: transparent;
            border: 1px solid #d0bcab;
            border-radius: 30px;
            padding: 0.2rem 0.8rem;
            font-size: 0.85rem;
            font-family: 'Monaco', monospace;
            min-width: 150px;
        }
        .value-edit:focus { background: white; border-color: #a16b48; outline: none; }
        .type-badge {
            background: #dacbbc;
            border-radius: 30px;
            padding: 0.1rem 0.6rem;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
        }
        .node-summary { color: #906f54; font-size: 0.85rem; cursor: pointer; }
        .null-value { color: #9a887b; font-style: italic; }

        /* 悬浮按钮组 */
        .float-buttons {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            pointer-events: none;
            z-index: 1000;
        }
        .float-buttons .btn {
            pointer-events: auto;
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 60px;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 18px -8px rgba(80, 50, 20, 0.5);
            border: none;
        }
        .btn-undo { background: #8f7b67; color: white; }
        .btn-redo { background: #b09b88; color: white; }
        .btn-encode { background: #a77557; color: white; }
        .btn-decode { background: #d3b59b; color: #2b1e14; }

        /* Toast */
        .toast-message {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #2e241d;
            color: #f0e2d4;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-size: 0.95rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
            z-index: 2000;
            opacity: 0;
            animation: fadeinout 2s ease forwards;
            pointer-events: none;
            white-space: nowrap;
        }
        @keyframes fadeinout {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }
        @media (max-width: 600px) {
            body { padding: 0.8rem; }
            .editor-container { padding: 1.2rem 1rem 5rem; }
            .float-buttons { right: 1rem; bottom: 1rem; gap: 0.5rem; }
            .float-buttons .btn { width: 3rem; height: 3rem; font-size: 1.2rem; }
            .toast-message { font-size: 0.8rem; white-space: normal; }
        }
    </style>
</head>
<body>
    <div class="editor-container">
        <h1>🍞 SugarCube 存档 · 性能优化版</h1>

        <!-- base64 功能区 -->
        <div class="base64-toolbar">
            <button class="btn" id="copyBase64Btn">复制</button>
            <button class="btn" id="pasteBase64Btn">粘贴</button>
            <span class="btn btn-file">
                选择文件
                <input type="file" id="filePicker" accept="*/*">
            </span>
            <button class="btn" id="downloadBase64Btn">下载txt</button>
        </div>
        <textarea id="base64Input" class="base64-textarea" placeholder="Base64 暗文（lz-string压缩）" spellcheck="false"></textarea>

        <!-- 节点编辑面板 -->
        <div class="node-edit-panel">
            <div class="panel-buttons">
                <button class="btn" id="newNodeBtn">➕ 新建节点</button>
                <button class="btn" id="deleteNodeBtn">✖ 删除当前节点</button>
                <span class="help-icon" id="newNodeHelp">?</span>
            </div>
            <textarea id="newNodeTextarea" class="node-edit-textarea" placeholder='输入合法 JSON 插入到当前节点下…'></textarea>
        </div>

        <!-- 搜索面板 -->
        <div class="search-panel">
            <div class="search-wrapper">
                <input type="text" id="searchInput" class="search-input" placeholder='搜索键/值 或 JSONPath ($.xxx)'>
                <button class="jsonpath-toggle" id="jsonpathToggleBtn">🔍 $</button>
            </div>
            <button class="search-btn" id="searchBtn">搜索</button>
            <span class="match-indicator" id="matchCounter">0/0</span>
            <button class="nav-arrow" id="prevMatchBtn">◀</button>
            <button class="nav-arrow" id="nextMatchBtn">▶</button>
        </div>

        <!-- 黑白名单工具栏 -->
        <div class="filter-toolbar">
            <span class="filter-label">📌 添加当前节点到搜索</span>
            <button class="filter-btn" id="addWhitelistBtn">⚪ 白名单</button>
            <button class="filter-btn" id="addBlacklistBtn">⚫ 黑名单</button>
            <button class="filter-btn mode-toggle" id="toggleFilterModeBtn">🔘 未启用</button>
            <button class="filter-btn clear-btn" id="clearFilterBtn">🗑️ 清空当前启用名单</button>
        </div>

        <!-- 面包屑 -->
        <div class="breadcrumb" id="breadcrumb"></div>

        <!-- json 树区域 -->
        <div id="jsonTree" class="json-tree"></div>

        <!-- 悬浮按钮组 -->
        <div class="float-buttons">
            <button class="btn btn-undo" id="undoBtn">↩</button>
            <button class="btn btn-redo" id="redoBtn">↪</button>
            <button class="btn btn-decode" id="decodeFloatBtn">解</button>
            <button class="btn btn-encode" id="encodeFloatBtn">编</button>
        </div>
    </div>

    <script>
        (function() {
            const { JSONPath } = window;

            // ----- 核心编解码 -----
            function decodeSugarCubeSave(base64String) {
                const trimmed = base64String.trim();
                const jsonString = LZString.decompressFromBase64(trimmed);
                if (!jsonString) throw new Error('无效的 SugarCube 存档 Base64 格式');
                return JSON.parse(jsonString);
            }
            function encodeSugarCubeSave(saveObject) {
                return LZString.compressToBase64(JSON.stringify(saveObject));
            }

            // ----- 全局状态 -----
            let rootWrapper = { root: { "example": "点击解码或输入base64" } };
            let currentPath = ['root'];
            let expandedSet = new Set();

            // 历史记录
            let historyStack = [];
            let historyIndex = -1;
            const MAX_HISTORY = 50;

            // 搜索结果
            let matchPaths = [];
            let matchIndex = -1;
            let lastSearchTerm = '';
            let jsonpathMode = false;

            // 黑白名单
            let whiteListPaths = new Set();
            let blackListPaths = new Set();
            let filterMode = 'none';

            // 节点类型映射
            let nodeTypeMap = new Map();

            // ----- IndexedDB 初始化 -----
            const DB_NAME = 'SugarCubeEditorDB';
            const STORE_NAME = 'editorState';
            let db = null;

            function openDB() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, 1);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => {
                        db = request.result;
                        resolve(db);
                    };
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            db.createObjectStore(STORE_NAME);
                        }
                    };
                });
            }

            async function saveStateToDB() {
                if (!db) return;
                const state = {
                    base64: document.getElementById('base64Input').value,
                    rootWrapper: rootWrapper,
                    whiteListPaths: Array.from(whiteListPaths),
                    blackListPaths: Array.from(blackListPaths),
                    filterMode: filterMode,
                    historyStack: historyStack,
                    historyIndex: historyIndex,
                    nodeTypeMap: Array.from(nodeTypeMap.entries()),
                    expandedSet: Array.from(expandedSet),
                    currentPath: currentPath,
                    jsonpathMode: jsonpathMode,
                    lastSearchTerm: lastSearchTerm,
                    matchPaths: matchPaths,
                    matchIndex: matchIndex,
                };
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                store.put(state, 'current');
                return tx.complete;
            }

            async function loadStateFromDB() {
                if (!db) return null;
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                return new Promise((resolve) => {
                    const request = store.get('current');
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => resolve(null);
                });
            }

            // 初始化DB并加载
            openDB().then(async () => {
                const saved = await loadStateFromDB();
                if (saved) {
                    document.getElementById('base64Input').value = saved.base64 || '';
                    rootWrapper = saved.rootWrapper || { root: {} };
                    whiteListPaths = new Set(saved.whiteListPaths || []);
                    blackListPaths = new Set(saved.blackListPaths || []);
                    filterMode = saved.filterMode || 'none';
                    historyStack = saved.historyStack || [];
                    historyIndex = saved.historyIndex !== undefined ? saved.historyIndex : -1;
                    nodeTypeMap = new Map(saved.nodeTypeMap || []);
                    expandedSet = new Set(saved.expandedSet || []);
                    currentPath = saved.currentPath || ['root'];
                    jsonpathMode = saved.jsonpathMode || false;
                    lastSearchTerm = saved.lastSearchTerm || '';
                    matchPaths = saved.matchPaths || [];
                    matchIndex = saved.matchIndex !== undefined ? saved.matchIndex : -1;
                    // 初始渲染
                    fullRender();
                    updateJsonpathToggle();
                } else {
                    pushHistory();
                    fullRender();
                }
            }).catch(console.warn);

            // ----- 历史管理 -----
            function pushHistory() {
                const snapshot = cloneDeep(rootWrapper);
                if (historyIndex < historyStack.length - 1) {
                    historyStack = historyStack.slice(0, historyIndex + 1);
                }
                historyStack.push(snapshot);
                if (historyStack.length > MAX_HISTORY) historyStack.shift();
                historyIndex = historyStack.length - 1;
                saveStateToDB();
            }

            function undo() {
                if (historyIndex > 0) {
                    historyIndex--;
                    rootWrapper = cloneDeep(historyStack[historyIndex]);
                    fullRender();
                    saveStateToDB();
                } else {
                    showToast('没有上一步');
                }
            }

            function redo() {
                if (historyIndex < historyStack.length - 1) {
                    historyIndex++;
                    rootWrapper = cloneDeep(historyStack[historyIndex]);
                    fullRender();
                    saveStateToDB();
                } else {
                    showToast('没有下一步');
                }
            }

            // 深拷贝
            function cloneDeep(obj) {
                return JSON.parse(JSON.stringify(obj));
            }

            // ----- 辅助函数 -----
            function getNodeByPath(path) {
                if (!Array.isArray(path) || path.length === 0) return { parent: null, key: null, value: rootWrapper };
                let value = rootWrapper;
                for (let i = 0; i < path.length - 1; i++) {
                    const seg = path[i];
                    if (value && typeof value === 'object' && seg in value) value = value[seg];
                    else return { parent: null, key: null, value: undefined };
                }
                const lastKey = path[path.length - 1];
                if (path.length === 1) return { parent: rootWrapper, key: lastKey, value: rootWrapper[lastKey] };
                const parent = getNodeByPath(path.slice(0, -1)).value;
                return { parent, key: lastKey, value: parent ? parent[lastKey] : undefined };
            }

            function setValueByPath(path, newValue) {
                const { parent, key } = getNodeByPath(path);
                if (parent && typeof parent === 'object' && key !== null) {
                    parent[key] = newValue;
                    return true;
                }
                return false;
            }

            function arrayEquals(a, b) {
                return a.length === b.length && a.every((v,i)=> v===b[i]);
            }

            function parseAsType(str, type) {
                if (type === 'string') return str;
                if (type === 'number') {
                    const num = Number(str);
                    return isNaN(num) ? str : num;
                }
                if (type === 'boolean') {
                    if (str.toLowerCase() === 'true') return true;
                    if (str.toLowerCase() === 'false') return false;
                    return str;
                }
                if (type === 'null') return null;
                if (type === 'object' || type === 'array') {
                    try { return JSON.parse(str); } catch { return str; }
                }
                return str;
            }

            function getNodeType(path, value) {
                const pathStr = JSON.stringify(path);
                if (nodeTypeMap.has(pathStr)) return nodeTypeMap.get(pathStr);
                if (value === null) return 'null';
                if (Array.isArray(value)) return 'array';
                if (typeof value === 'object') return 'object';
                return typeof value;
            }

            function setNodeType(path, type) {
                nodeTypeMap.set(JSON.stringify(path), type);
            }

            // ----- 高亮更新（仅切换 current-node 类，不重建树）-----
            function updateCurrentNodeHighlight() {
                const rows = document.querySelectorAll('.node-row');
                rows.forEach(row => row.classList.remove('current-node'));
                const targetRow = Array.from(rows).find(row => {
                    const pathAttr = row.getAttribute('data-path');
                    if (!pathAttr) return false;
                    try { return arrayEquals(JSON.parse(pathAttr), currentPath); }
                    catch { return false; }
                });
                if (targetRow) {
                    targetRow.classList.add('current-node');
                    scrollCurrentNodeIntoView();
                }
            }

            // 滚动当前节点到视野中央
            function scrollCurrentNodeIntoView() {
                requestAnimationFrame(() => {
                    const container = document.getElementById('jsonTree');
                    if (!container) return;
                    const rows = container.querySelectorAll('.node-row');
                    const targetRow = Array.from(rows).find(row => {
                        const pathAttr = row.getAttribute('data-path');
                        if (!pathAttr) return false;
                        try { return arrayEquals(JSON.parse(pathAttr), currentPath); }
                        catch { return false; }
                    });
                    if (!targetRow) return;

                    const containerRect = container.getBoundingClientRect();
                    const targetRect = targetRow.getBoundingClientRect();

                    const relativeTop = targetRect.top - containerRect.top;
                    const targetHeight = targetRow.offsetHeight;
                    const targetScrollTop = container.scrollTop + relativeTop - (container.clientHeight / 2) + (targetHeight / 2);

                    const relativeLeft = targetRect.left - containerRect.left;
                    const targetWidth = targetRow.offsetWidth;
                    const targetScrollLeft = container.scrollLeft + relativeLeft - (container.clientWidth / 2) + (targetWidth / 2);

                    container.scrollTo({ top: targetScrollTop, left: targetScrollLeft, behavior: 'smooth' });
                });
            }

            // ----- Toast -----
            function showToast(message, duration = 2000) {
                const existing = document.querySelector('.toast-message');
                if (existing) existing.remove();
                const toast = document.createElement('div');
                toast.className = 'toast-message';
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), duration);
            }

            // ----- 全量渲染（用于初始加载或大规模变动）-----
            function fullRender() {
                renderTree();
                renderBreadcrumb();
                updateMatchCounter();
                updateFilterUI();
                scrollCurrentNodeIntoView();
                saveStateToDB();
            }

            // 仅刷新轻量级UI（面包屑、计数器、筛选按钮，不重绘树）
            function refreshLightUI() {
                renderBreadcrumb();
                updateMatchCounter();
                updateFilterUI();
                saveStateToDB();
            }

            // 设置当前路径并仅更新高亮
            function setCurrentPath(path) {
                if (!path) return;
                currentPath = path.slice();
                updateCurrentNodeHighlight();
                renderBreadcrumb(); // 面包屑需要更新
                saveStateToDB();
            }

            // ----- 树渲染（全量构建）-----
            function renderTree() {
                const container = document.getElementById('jsonTree');
                container.innerHTML = '';
                const rootEl = renderNode('root', rootWrapper['root'], ['root'], 0);
                if (rootEl) container.appendChild(rootEl);
            }

            function renderNode(key, value, path, level) {
                const li = document.createElement('li');
                li.className = 'tree-node';
                const row = document.createElement('div');
                row.className = 'node-row' + (arrayEquals(path, currentPath) ? ' current-node' : '');
                row.dataset.path = JSON.stringify(path);

                const isCollapsible = value && typeof value === 'object';
                const toggleSpan = document.createElement('span');
                toggleSpan.className = 'toggle';
                if (isCollapsible) {
                    const expanded = expandedSet.has(JSON.stringify(path));
                    toggleSpan.textContent = expanded ? '▼' : '▶';
                    toggleSpan.onclick = (e) => {
                        e.stopPropagation();
                        const strPath = JSON.stringify(path);
                        if (expandedSet.has(strPath)) expandedSet.delete(strPath);
                        else expandedSet.add(strPath);
                        // 展开折叠时局部更新：重新渲染该节点下的子树，但为简单，全量渲染
                        // 可以优化为只更新该节点，但考虑到性能影响不大，暂时保留全量
                        fullRender();
                    };
                } else toggleSpan.textContent = '  ';
                row.appendChild(toggleSpan);

                const keySpan = document.createElement('span');
                keySpan.className = 'key';
                keySpan.textContent = key;
                keySpan.onclick = (e) => { e.stopPropagation(); setCurrentPath(path); };
                row.appendChild(keySpan);
                row.appendChild(document.createElement('span')).className = 'colon';
                row.lastChild.textContent = ':';

                if (isCollapsible) {
                    const summary = Array.isArray(value) ? `Array(${value.length})` : 'Object';
                    const valSpan = document.createElement('span');
                    valSpan.className = 'node-summary';
                    valSpan.textContent = ` ${summary}`;
                    valSpan.onclick = (e) => { e.stopPropagation(); setCurrentPath(path); };
                    row.appendChild(valSpan);
                } else {
                    const valueBlock = document.createElement('span');
                    valueBlock.className = 'value-block';

                    const currentType = getNodeType(path, value);
                    const typeBadge = document.createElement('span');
                    typeBadge.className = 'type-badge';
                    typeBadge.textContent = currentType;
                    typeBadge.onclick = (e) => {
                        e.stopPropagation();
                        const types = ['string', 'number', 'boolean', 'null', 'object', 'array'];
                        let idx = types.indexOf(currentType);
                        idx = (idx + 1) % types.length;
                        const newType = types[idx];
                        const oldValue = value;
                        let newValue;
                        try {
                            if (newType === 'object' || newType === 'array') {
                                newValue = JSON.parse(String(oldValue));
                            } else {
                                newValue = parseAsType(String(oldValue), newType);
                            }
                        } catch {
                            newValue = oldValue;
                            showToast(`无法转换为${newType}，已保留原值`);
                        }
                        // 类型切换可能导致结构变化，简单全量渲染
                        modifyData(() => {
                            setNodeType(path, newType);
                            setValueByPath(path, newValue);
                        });
                    };
                    valueBlock.appendChild(typeBadge);

                    const input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'value-edit';
                    input.value = (value === null) ? 'null' : String(value);
                    input.dataset.path = JSON.stringify(path);
                    input.addEventListener('click', e => e.stopPropagation());
                    input.addEventListener('change', e => {
                        const raw = e.target.value;
                        const targetPath = JSON.parse(e.target.dataset.path);
                        const nodeInfo = getNodeByPath(targetPath);
                        const oldValue = nodeInfo.value;
                        const currentType = getNodeType(targetPath, oldValue);
                        let parsed;
                        try {
                            parsed = parseAsType(raw, currentType);
                        } catch {
                            parsed = raw;
                        }
                        const actualType = parsed === null ? 'null' : typeof parsed;
                        if (actualType !== currentType && !(currentType === 'object' && actualType === 'array')) {
                            showToast(`输入值类型(${actualType})与当前类型(${currentType})不符，但已保存`);
                        }
                        // 如果值改变且类型不变（简单类型），我们可以只更新输入框的值，避免全量重绘
                        if (actualType === currentType && !Array.isArray(parsed) && typeof parsed !== 'object') {
                            // 直接更新数据并修改DOM
                            modifyDataWithoutRender(() => {
                                setValueByPath(targetPath, parsed);
                            });
                            // 更新输入框显示（其实输入框已经是最新，但以防解析后格式变化）
                            e.target.value = String(parsed);
                            // 类型徽章可能不变，无需更新
                        } else {
                            // 类型变化或变成对象，全量渲染
                            modifyData(() => {
                                setValueByPath(targetPath, parsed);
                            });
                        }
                    });
                    valueBlock.appendChild(input);
                    row.appendChild(valueBlock);
                }

                li.appendChild(row);

                if (isCollapsible && expandedSet.has(JSON.stringify(path))) {
                    const children = document.createElement('ul');
                    if (Array.isArray(value)) {
                        value.forEach((item, idx) => {
                            children.appendChild(renderNode(idx.toString(), item, path.concat(idx.toString()), level+1));
                        });
                    } else if (value && typeof value === 'object') {
                        Object.entries(value).forEach(([k, v]) => {
                            children.appendChild(renderNode(k, v, path.concat(k), level+1));
                        });
                    }
                    li.appendChild(children);
                }
                return li;
            }

            // 修改数据但不全量渲染（用于简单值更新）
            function modifyDataWithoutRender(callback) {
                callback();
                pushHistory();  // 记录历史
                // 不调用 fullRender，仅更新轻量UI
                refreshLightUI();
                // 但当前节点高亮可能不变，无需额外操作
            }

            // 修改数据并全量渲染（用于结构变化）
            function modifyData(callback) {
                callback();
                pushHistory();
                fullRender();
            }

            // 面包屑
            function renderBreadcrumb() {
                const bread = document.getElementById('breadcrumb');
                bread.innerHTML = '';
                let acc = [];
                for (let i = 0; i < currentPath.length; i++) {
                    acc.push(currentPath[i]);
                    const part = currentPath[i];
                    const crumb = document.createElement('span');
                    crumb.className = 'crumb-item';
                    crumb.textContent = part;
                    crumb.dataset.path = JSON.stringify(acc.slice());
                    crumb.onclick = (e) => {
                        const p = JSON.parse(e.target.dataset.path);
                        setCurrentPath(p);
                        const nodeInfo = getNodeByPath(p);
                        if (nodeInfo.value && typeof nodeInfo.value === 'object') {
                            expandedSet.add(JSON.stringify(p));
                        }
                        // 如果点击的面包屑是容器，可能需要展开，但我们只切换高亮，展开状态通过 expandedSet 控制，需要重新渲染？但 setCurrentPath 不会重绘树，所以需要手动更新展开状态？这里暂时不自动展开，让用户手动点击展开。如果希望自动展开，可以调用 fullRender，但为了性能，我们只更新高亮，展开状态保持不变。
                        // 但为了看到子节点，用户可能需要点击展开按钮。合理。
                    };
                    bread.appendChild(crumb);
                    if (i < currentPath.length - 1) bread.appendChild(document.createTextNode(' / '));
                }
            }

            // 筛选UI更新
            function updateFilterUI() {
                const toggleBtn = document.getElementById('toggleFilterModeBtn');
                toggleBtn.textContent = filterMode === 'none' ? '🔘 未启用' : (filterMode === 'whitelist' ? '⚪ 启用白名单' : '⚫ 启用黑名单');
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                if (filterMode === 'whitelist') document.getElementById('addWhitelistBtn').classList.add('active');
                if (filterMode === 'blacklist') document.getElementById('addBlacklistBtn').classList.add('active');
            }

            // 新增节点帮助
            document.getElementById('newNodeHelp').onclick = () => {
                showToast('当当前节点为数组时：输入数组会合并到末尾，其他类型追加到末尾；为对象时：输入对象会合并，其他类型以newKey命名添加');
            };

            // 删除当前节点
            document.getElementById('deleteNodeBtn').onclick = () => {
                if (arrayEquals(currentPath, ['root'])) {
                    showToast('不能删除根节点');
                    return;
                }
                modifyData(() => {
                    const { parent, key } = getNodeByPath(currentPath);
                    if (parent && key !== null) {
                        if (Array.isArray(parent)) {
                            parent.splice(Number(key), 1);
                        } else {
                            delete parent[key];
                        }
                    }
                });
            };

            // JSONPath 切换
            function updateJsonpathToggle() {
                document.getElementById('jsonpathToggleBtn').innerHTML = jsonpathMode ? '🔍 $ (路径)' : '🔍 a (文本)';
            }
            document.getElementById('jsonpathToggleBtn').onclick = () => {
                jsonpathMode = !jsonpathMode;
                updateJsonpathToggle();
                if (lastSearchTerm) search(lastSearchTerm);
            };

            // 搜索函数
            function search(term) {
                if (!term.trim()) { matchPaths = []; matchIndex = -1; fullRender(); return; }
                let matches = [];
                if (jsonpathMode) {
                    try {
                        const pathResults = JSONPath({ path: term, json: rootWrapper, resultType: 'path' });
                        matches = pathResults.map(p => {
                            const parts = p.replace(/^\$\[?/, '').split(/\]\['?|'\]\[|'\]|\[/).filter(s => s && s !== '');
                            return ['root', ...parts];
                        });
                    } catch (e) {
                        showToast('JSONPath 错误: ' + e.message);
                        matches = [];
                    }
                } else {
                    const lowerTerm = term.toLowerCase();
                    function traverse(obj, path) {
                        if (!obj || typeof obj !== 'object') return;
                        if (Array.isArray(obj)) {
                            obj.forEach((item, idx) => {
                                const curPath = path.concat(idx.toString());
                                if (!isPathAllowed(curPath)) return;
                                if (idx.toString().toLowerCase().includes(lowerTerm)) matches.push(curPath);
                                if (item && typeof item === 'object') traverse(item, curPath);
                                else if (String(item).toLowerCase().includes(lowerTerm)) matches.push(curPath);
                            });
                        } else {
                            Object.entries(obj).forEach(([k, v]) => {
                                const curPath = path.concat(k);
                                if (!isPathAllowed(curPath)) return;
                                if (k.toLowerCase().includes(lowerTerm)) matches.push(curPath);
                                if (v && typeof v === 'object') traverse(v, curPath);
                                else if (String(v).toLowerCase().includes(lowerTerm)) matches.push(curPath);
                            });
                        }
                    }
                    traverse(rootWrapper.root, ['root']);
                }
                matchPaths = matches;
                matchIndex = matchPaths.length > 0 ? 0 : -1;
                if (matchIndex >= 0) jumpToMatch(matchIndex);
                else fullRender();
                updateMatchCounter();
            }

            function jumpToMatch(idx) {
                if (!matchPaths.length) return;
                matchIndex = idx;
                const path = matchPaths[idx];
                expandedSet.clear();
                for (let i = 1; i <= path.length; i++) {
                    const anc = path.slice(0, i);
                    if (getNodeByPath(anc).value && typeof getNodeByPath(anc).value === 'object')
                        expandedSet.add(JSON.stringify(anc));
                }
                // 跳转时由于需要展开，必须全量渲染
                setCurrentPath(path);  // 先更新高亮
                fullRender();           // 重新渲染以展开节点
            }

            function updateMatchCounter() {
                document.getElementById('matchCounter').textContent = matchPaths.length ? `${matchIndex+1}/${matchPaths.length}` : '0/0';
            }

            function isPathAllowed(path) {
                if (filterMode === 'none') return true;
                const pathStr = JSON.stringify(path);
                if (filterMode === 'whitelist') {
                    for (let i=1; i<=path.length; i++) if (whiteListPaths.has(JSON.stringify(path.slice(0,i)))) return true;
                    return false;
                } else {
                    for (let i=1; i<=path.length; i++) if (blackListPaths.has(JSON.stringify(path.slice(0,i)))) return false;
                    return true;
                }
            }

            // 黑白名单操作
            function addToWhitelist() {
                const p = JSON.stringify(currentPath);
                blackListPaths.delete(p); whiteListPaths.add(p);
                showToast(`已添加 [${currentPath.join('/')}] 到白名单`);
                updateFilterUI(); saveStateToDB();
            }
            function addToBlacklist() {
                const p = JSON.stringify(currentPath);
                whiteListPaths.delete(p); blackListPaths.add(p);
                showToast(`已添加 [${currentPath.join('/')}] 到黑名单`);
                updateFilterUI(); saveStateToDB();
            }
            function toggleFilterMode() {
                filterMode = filterMode === 'none' ? 'whitelist' : filterMode === 'whitelist' ? 'blacklist' : 'none';
                showToast(`过滤模式: ${filterMode}`);
                updateFilterUI();
                if (lastSearchTerm) search(lastSearchTerm);
            }
            function clearCurrentFilter() {
                if (filterMode === 'whitelist') whiteListPaths.clear();
                else if (filterMode === 'blacklist') blackListPaths.clear();
                else { whiteListPaths.clear(); blackListPaths.clear(); }
                showToast('名单已清空');
                if (lastSearchTerm) search(lastSearchTerm);
                else fullRender();
            }

            // 新建节点
            function createNewNodeFromText() {
                const raw = document.getElementById('newNodeTextarea').value.trim();
                if (!raw) return showToast('请输入 JSON');
                let parsed;
                try { parsed = JSON.parse(raw); } catch { return showToast('无效 JSON'); }
                const nodeInfo = getNodeByPath(currentPath);
                if (!nodeInfo || nodeInfo.value === undefined) return showToast('当前节点无效');
                const target = nodeInfo.value;
                if (!target || typeof target !== 'object') return showToast('只能在对象或数组下插入新节点');

                modifyData(() => {
                    if (Array.isArray(target)) {
                        if (Array.isArray(parsed)) target.push(...parsed);
                        else target.push(parsed);
                    } else {
                        if (parsed && typeof parsed === 'object') Object.assign(target, parsed);
                        else {
                            let baseKey = 'newKey';
                            let c=1; while (baseKey in target) baseKey = `newKey${c++}`;
                            target[baseKey] = parsed;
                        }
                    }
                    expandedSet.add(JSON.stringify(currentPath));
                });
                document.getElementById('newNodeTextarea').value = '';
            }

            // 解码
            function decodeFromBase64() {
                const base64 = document.getElementById('base64Input').value.trim();
                if (!base64) return showToast('Base64 为空');
                try {
                    const decoded = decodeSugarCubeSave(base64);
                    modifyData(() => {
                        rootWrapper = { root: decoded };
                        expandedSet.clear();
                        whiteListPaths.clear();
                        blackListPaths.clear();
                        filterMode = 'none';
                        currentPath = ['root'];
                        nodeTypeMap.clear();
                    });
                    showToast('解码成功');
                } catch (e) { showToast('解码失败: ' + e.message); }
            }

            // 编码并复制
            function encodeAndCopy() {
                try {
                    const base64 = encodeSugarCubeSave(rootWrapper.root);
                    document.getElementById('base64Input').value = base64;
                    navigator.clipboard.writeText(base64).then(() => showToast('编码已复制')).catch(() => showToast('编码成功，但复制失败'));
                } catch (e) { showToast('编码失败: ' + e.message); }
            }

            // 粘贴并自动解码
            document.getElementById('pasteBase64Btn').onclick = () => {
                navigator.clipboard.readText().then(text => {
                    document.getElementById('base64Input').value = text;
                    decodeFromBase64();
                }).catch(() => showToast('无法读取剪贴板'));
            };

            // 文件选择并自动解码
            document.getElementById('filePicker').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    document.getElementById('base64Input').value = ev.target.result;
                    decodeFromBase64();
                };
                reader.readAsText(file);
            });

            // 按钮绑定
            document.getElementById('copyBase64Btn').onclick = () => {
                navigator.clipboard.writeText(document.getElementById('base64Input').value).then(() => showToast('已复制')).catch(() => showToast('复制失败'));
            };
            document.getElementById('downloadBase64Btn').onclick = () => {
                const val = document.getElementById('base64Input').value;
                if (!val) return showToast('无内容');
                const blob = new Blob([val], {type: 'text/plain'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'sugarcube_save.txt';
                a.click();
                URL.revokeObjectURL(a.href);
            };
            document.getElementById('undoBtn').onclick = undo;
            document.getElementById('redoBtn').onclick = redo;
            document.getElementById('decodeFloatBtn').onclick = decodeFromBase64;
            document.getElementById('encodeFloatBtn').onclick = encodeAndCopy;
            document.getElementById('newNodeBtn').onclick = createNewNodeFromText;
            document.getElementById('searchBtn').onclick = () => {
                lastSearchTerm = document.getElementById('searchInput').value;
                search(lastSearchTerm);
            };
            document.getElementById('prevMatchBtn').onclick = () => {
                if (matchPaths.length && matchIndex > 0) jumpToMatch(matchIndex-1);
                updateMatchCounter();
            };
            document.getElementById('nextMatchBtn').onclick = () => {
                if (matchPaths.length && matchIndex < matchPaths.length-1) jumpToMatch(matchIndex+1);
                updateMatchCounter();
            };

            // 黑白名单事件
            document.getElementById('addWhitelistBtn').onclick = addToWhitelist;
            document.getElementById('addBlacklistBtn').onclick = addToBlacklist;
            document.getElementById('toggleFilterModeBtn').onclick = toggleFilterMode;
            document.getElementById('clearFilterBtn').onclick = clearCurrentFilter;

            // 初始化渲染
            // fullRender 已经在加载DB后调用
        })();
    </script>
</body>
</html>
