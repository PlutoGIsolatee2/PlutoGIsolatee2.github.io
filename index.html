<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍞 SugarCube 存档编辑器 · 最终版</title>
    <!-- lz-string -->
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
    <!-- CodeMirror 核心和依赖 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/lint/lint.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/dialog/dialog.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/fold/foldgutter.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/lint/lint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/lint/json-lint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/search/search.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/search/searchcursor.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/dialog/dialog.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/selection/active-line.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/fold/foldcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/fold/foldgutter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/fold/brace-fold.min.js"></script>
    <!-- JSON lint 库 -->
    <script src="https://cdn.jsdelivr.net/npm/jsonlint@1.6.3/lib/jsonlint.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; font-family: system-ui, sans-serif; }
        body { background: #f4f3f0; padding: 1.5rem; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .editor-container { max-width: 1400px; width: 100%; background: #fefcf7; border-radius: 28px; box-shadow: 0 25px 40px -12px rgba(40,30,10,0.3); padding: 2rem 2rem 4rem 2rem; position: relative; }
        h1 { font-weight: 500; font-size: 2.2rem; color: #3a2e28; margin-bottom: 1.5rem; border-left: 6px solid #b87c5a; padding-left: 1.3rem; }
        .base64-toolbar { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-bottom: 0.8rem; align-items: center; }
        .btn { background: #eae3da; border: none; padding: 0.5rem 1.2rem; border-radius: 60px; font-size: 0.9rem; font-weight: 500; color: #3a2e28; cursor: pointer; transition: 0.15s; border: 1px solid transparent; }
        .btn:hover { background: #d9cdbf; border-color: #c1a58b; }
        .btn-file { background: #dbd0c2; position: relative; display: inline-block; }
        .btn-file input { position: absolute; left:0; top:0; opacity:0; width:100%; height:100%; cursor:pointer; }
        .base64-textarea { width:100%; padding:1rem; font-family:'Monaco',monospace; font-size:0.85rem; background:#f6f3ef; border:1px solid #d9cfc0; border-radius:24px; margin-bottom:1.8rem; resize:vertical; min-height:100px; }
        .simple-edit-panel { background:#ece3d9; border-radius:40px; padding:1rem 1.5rem; margin:1rem 0; display:flex; flex-direction:column; gap:0.8rem; }
        .simple-panel-buttons { display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap; }
        .simple-cm-container { border:1px solid #c9b6a2; border-radius:24px; overflow:hidden; background:#fcf9f4; max-height:200px; }
        .simple-cm-container .CodeMirror { height:200px; font-family:'Monaco',monospace; font-size:0.85rem; }
        .help-icon { background:#cbb59e; border-radius:50%; width:1.8rem; height:1.8rem; display:inline-flex; align-items:center; justify-content:center; font-weight:bold; cursor:help; margin-left:0.2rem; }
        .full-edit-panel { background:#e3d9ce; border-radius:40px; padding:1rem 1.5rem; margin:1rem 0; display:flex; flex-direction:column; gap:0.8rem; }
        .full-panel-buttons { display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap; }
        .cm-editor-container { border:1px solid #b9a690; border-radius:24px; overflow:hidden; background:#fcf9f4; max-height:400px; }
        .cm-editor-container .CodeMirror { height:400px; font-family:'Monaco',monospace; font-size:0.9rem; }
        .search-panel { display:flex; flex-wrap:wrap; gap:0.5rem; align-items:center; background:#ece5db; padding:0.6rem 1.2rem; border-radius:60px; margin:1rem 0 0.8rem; }
        .search-wrapper { flex:3 1 250px; display:flex; background:white; border-radius:40px; border:1px solid #cfbfad; overflow:hidden; }
        .search-input { flex:1; padding:0.6rem 1.2rem; border:none; outline:none; font-size:0.9rem; }
        .jsonpath-toggle { background:#d9caba; border:none; padding:0 1rem; font-weight:600; cursor:pointer; display:flex; align-items:center; transition:background 0.2s; }
        .jsonpath-toggle.active { background:#b29e88; color:white; }
        .search-btn { background:#cab89e; border:none; border-radius:40px; padding:0.6rem 1.4rem; font-weight:600; color:#2e241d; }
        .match-indicator { background:#ddcfbe; padding:0.2rem 1rem; border-radius:36px; font-size:0.9rem; font-weight:500; min-width:70px; text-align:center; }
        .nav-arrow { background:none; border:1px solid #b29e88; font-size:1.2rem; padding:0.2rem 0.8rem; border-radius:30px; cursor:pointer; }
        .filter-toolbar { background:#e8dfd2; padding:0.7rem 1.5rem; border-radius:60px; margin:0.5rem 0 1rem; display:flex; flex-wrap:wrap; align-items:center; gap:0.8rem 1.2rem; font-size:0.95rem; }
        .filter-label { font-weight:500; color:#4f3f33; }
        .filter-btn { background:#dbcdbc; border:none; border-radius:40px; padding:0.4rem 1.2rem; font-size:0.9rem; cursor:pointer; border:1px solid #c5af99; }
        .filter-btn.active { background:#b87c5a; color:white; border-color:#9b6243; }
        .mode-toggle { background:#cbb59e; font-weight:600; min-width:130px; }
        .clear-btn { background:#ccb7a2; }
        .breadcrumb { background:#e2d7cb; padding:0.6rem 1.2rem; border-radius:40px; margin:0.8rem 0 1rem; font-size:0.95rem; display:flex; flex-wrap:wrap; gap:0.3rem 0.6rem; color:#4f3f33; }
        .crumb-item { cursor:pointer; padding:0.1rem 0.5rem; border-radius:30px; background:#f2ece3; }
        .crumb-item:hover { background:#d4bfab; }
        .json-tree { background:#fbf9f5; border:1px solid #ddd2c2; border-radius:32px; padding:1.5rem 1.2rem; overflow:auto; max-height:500px; box-shadow:inset 0 0 0 1px rgba(255,250,240,0.8); scroll-behavior:smooth; }
        .tree-node { margin-left:1.4rem; list-style:none; }
        .tree-node ul { padding-left:1.4rem; margin:0.2rem 0; list-style:none; }
        .node-row { display:flex; align-items:center; gap:6px; padding:0.2rem 0.1rem; border-radius:30px; cursor:default; white-space:nowrap; width:max-content; min-width:100%; box-sizing:border-box; }
        .node-row.current-node { background:#efe4d7; outline:1px solid #c9aa8b; }
        .toggle { width:1.2rem; display:inline-block; cursor:pointer; font-size:0.9rem; color:#8b6f58; user-select:none; flex-shrink:0; }
        .key { font-weight:600; color:#684e3a; cursor:pointer; flex-shrink:0; }
        .colon { margin-right:4px; flex-shrink:0; }
        .value-text { font-family:'Monaco',monospace; color:#2b4a3c; background:#f1ebe4; border-radius:30px; padding:0.1rem 0.8rem; display:inline-block; max-width:none; overflow:visible; white-space:nowrap; }
        .type-badge { background:#dacbbc; border-radius:30px; padding:0.1rem 0.6rem; font-size:0.7rem; font-weight:600; color:#3a2e28; flex-shrink:0; }
        .node-summary { color:#906f54; font-size:0.85rem; cursor:pointer; flex-shrink:0; }
        .null-value { color:#9a887b; font-style:italic; }
        .float-buttons { position:fixed; bottom:2rem; right:2rem; display:flex; flex-direction:column; gap:0.8rem; pointer-events:none; z-index:1000; }
        .float-buttons .btn { pointer-events:auto; width:3.5rem; height:3.5rem; border-radius:60px; font-size:1.4rem; display:flex; align-items:center; justify-content:center; box-shadow:0 12px 18px -8px rgba(80,50,20,0.5); border:none; }
        .btn-undo { background:#8f7b67; color:white; }
        .btn-redo { background:#b09b88; color:white; }
        .btn-encode { background:#a77557; color:white; }
        .btn-decode { background:#d3b59b; color:#2b1e14; }
        .toast-message { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%); background:#2e241d; color:#f0e2d4; padding:0.8rem 2rem; border-radius:60px; font-size:0.95rem; box-shadow:0 8px 20px rgba(0,0,0,0.25); z-index:2000; opacity:0; animation:fadeinout 2s ease forwards; pointer-events:none; white-space:nowrap; }
        @keyframes fadeinout { 0%{opacity:0; transform:translateX(-50%) translateY(10px);} 15%{opacity:1; transform:translateX(-50%) translateY(0);} 85%{opacity:1; transform:translateX(-50%) translateY(0);} 100%{opacity:0; transform:translateX(-50%) translateY(-10px);} }
        @media (max-width:600px) { body{padding:0.8rem;} .editor-container{padding:1.2rem 1rem 5rem;} .float-buttons{right:1rem; bottom:1rem; gap:0.5rem;} .float-buttons .btn{width:3rem; height:3rem; font-size:1.2rem;} .toast-message{font-size:0.8rem; white-space:normal;} .json-tree{padding:1rem 0.8rem;} .tree-node{margin-left:1rem;} .tree-node ul{padding-left:1rem;} }
    </style>
</head>
<body>
    <div class="editor-container">
        <h1>🍞 SugarCube 存档 · 最终版</h1>

        <!-- base64 功能区 -->
        <div class="base64-toolbar">
            <button class="btn" id="copyBase64Btn">复制</button>
            <button class="btn" id="pasteBase64Btn">粘贴</button>
            <span class="btn btn-file">
                选择文件
                <input type="file" id="filePicker" accept="*/*">
            </span>
            <button class="btn" id="downloadBase64Btn">下载txt</button>
        </div>
        <textarea id="base64Input" class="base64-textarea" placeholder="Base64 暗文（lz-string压缩）" spellcheck="false"></textarea>

        <!-- 搜索面板 -->
        <div class="search-panel">
            <div class="search-wrapper">
                <input type="text" id="searchInput" class="search-input" placeholder='搜索键/值 或 JSONPath (如 $.root.state)'>
                <button class="jsonpath-toggle" id="jsonpathToggleBtn">$</button>
            </div>
            <button class="search-btn" id="searchBtn">搜索</button>
            <span class="match-indicator" id="matchCounter">0/0</span>
            <button class="nav-arrow" id="prevMatchBtn">◀</button>
            <button class="nav-arrow" id="nextMatchBtn">▶</button>
        </div>

        <!-- 黑白名单工具栏 -->
        <div class="filter-toolbar">
            <span class="filter-label">📌 添加当前节点到搜索</span>
            <button class="filter-btn" id="addWhitelistBtn">⚪ 白名单</button>
            <button class="filter-btn" id="addBlacklistBtn">⚫ 黑名单</button>
            <button class="filter-btn mode-toggle" id="toggleFilterModeBtn">🔘 未启用</button>
            <button class="filter-btn clear-btn" id="clearFilterBtn">🗑️ 清空当前启用名单</button>
        </div>

        <!-- 面包屑 -->
        <div class="breadcrumb" id="breadcrumb"></div>

        <!-- json 树区域 -->
        <div id="jsonTree" class="json-tree"></div>

        <!-- 简单编辑面板 (新建/删除节点 + CodeMirror) 置于树下方 -->
        <div class="simple-edit-panel">
            <div class="simple-panel-buttons">
                <button class="btn" id="newNodeBtn">➕ 新建节点</button>
                <button class="btn" id="deleteNodeBtn">✖ 删除当前节点</button>
                <span class="help-icon" id="newNodeHelp" title="当前节点为数组：输入数组会合并到末尾，其他类型追加到末尾；当前节点为对象：只能输入对象进行合并，输入其他类型会报错">?</span>
            </div>
            <div class="simple-cm-container">
                <textarea id="simpleEditor" placeholder="输入合法 JSON 插入到当前节点下…"></textarea>
            </div>
        </div>

        <!-- 全量编辑面板 (CodeMirror) 置于简单面板下方 -->
        <div class="full-edit-panel">
            <div class="full-panel-buttons">
                <button class="btn" id="editCurrentNodeBtn">✎ 编辑当前节点</button>
                <button class="btn" id="pushNodeBtn">⏎ 推送修改</button>
                <button class="btn" id="clearEditorBtn">🗑️ 清空编辑器</button>
                <button class="btn" id="cmUndoBtn">↩ 撤销</button>
                <button class="btn" id="cmRedoBtn">↪ 重做</button>
                <button class="btn" id="cmFormatBtn">✨ 格式化</button>
            </div>
            <div class="cm-editor-container">
                <textarea id="nodeEditor" placeholder="当前节点的 JSON 表示..."></textarea>
            </div>
        </div>

        <!-- 悬浮按钮组 -->
        <div class="float-buttons">
            <button class="btn btn-undo" id="undoBtn">↩</button>
            <button class="btn btn-redo" id="redoBtn">↪</button>
            <button class="btn btn-decode" id="decodeFloatBtn">解</button>
            <button class="btn btn-encode" id="encodeFloatBtn">编</button>
        </div>
    </div>

    <script type="module">
        import { JSONPath } from 'https://cdn.jsdelivr.net/npm/jsonpath-plus@10.4.0/dist/index-browser-esm.min.js';

        // ----- 核心编解码 -----
        function decodeSugarCubeSave(base64String) {
            const trimmed = base64String.trim();
            const jsonString = LZString.decompressFromBase64(trimmed);
            if (!jsonString) throw new Error('无效的 SugarCube 存档 Base64 格式');
            return JSON.parse(jsonString);
        }
        function encodeSugarCubeSave(saveObject) {
            return LZString.compressToBase64(JSON.stringify(saveObject));
        }

        // ----- 全局状态 -----
        let rootWrapper = { root: { "example": "点击解码或输入base64" } };
        let currentPath = ['root'];
        let expandedSet = new Set();

        let historyStack = [];
        let historyIndex = -1;
        const MAX_HISTORY = 50;

        let matchPaths = [];
        let matchIndex = -1;
        let lastSearchTerm = '';
        let jsonpathMode = false;

        let whiteListPaths = new Set();
        let blackListPaths = new Set();
        let filterMode = 'none';

        let nodeTypeMap = new Map();

        // ----- CodeMirror 编辑器 -----
        let cmEditor;
        let currentEditPath = null;
        let editorDirty = false;
        let simpleEditor;

        function initCodeMirrors() {
            const fullTextarea = document.getElementById('nodeEditor');
            cmEditor = CodeMirror.fromTextArea(fullTextarea, {
                mode: 'application/json',
                theme: 'default',
                lineNumbers: true,
                autoCloseBrackets: true,
                matchBrackets: true,
                styleActiveLine: true,
                gutters: ['CodeMirror-lint-markers', 'CodeMirror-foldgutter'],
                lint: true,
                foldGutter: true,
                extraKeys: {
                    'Ctrl-Space': 'autocomplete',
                    'Cmd-/': 'toggleComment',
                    'Ctrl-F': 'findPersistent',
                    'Ctrl-G': 'findNext',
                    'Shift-Ctrl-G': 'findPrev',
                    'Ctrl-Q': function(cm) { cm.foldCode(cm.getCursor()); }
                }
            });
            cmEditor.on('change', () => { editorDirty = true; });

            const simpleTextarea = document.getElementById('simpleEditor');
            simpleEditor = CodeMirror.fromTextArea(simpleTextarea, {
                mode: 'application/json',
                theme: 'default',
                lineNumbers: true,
                autoCloseBrackets: true,
                matchBrackets: true,
                styleActiveLine: true,
                lint: true,
                extraKeys: { 'Ctrl-Space': 'autocomplete', 'Cmd-/': 'toggleComment' }
            });
        }

        function formatCode() {
            try {
                const content = cmEditor.getValue();
                const parsed = JSON.parse(content);
                cmEditor.setValue(JSON.stringify(parsed, null, 2));
                showToast('格式化完成');
            } catch (e) { showToast('格式化失败：不是有效的 JSON'); }
        }

        function loadNodeToEditor(path) {
            const nodeInfo = getNodeByPath(path);
            if (!nodeInfo || nodeInfo.value === undefined) { showToast('节点无效'); return false; }
            const jsonStr = JSON.stringify(nodeInfo.value, null, 2);
            if (jsonStr.length > 500 * 1024 && !confirm('节点超过500KB，确定继续？')) return false;
            cmEditor.setValue(jsonStr);
            currentEditPath = path.slice();
            editorDirty = false;
            saveEditorStateToDB();
            return true;
        }

        function pushEditorToTree() {
            if (!currentEditPath) { showToast('没有正在编辑的节点'); return; }
            try {
                const parsed = JSON.parse(cmEditor.getValue());
                modifyData(() => {
                    setValueByPath(currentEditPath, parsed);
                    const prefix = JSON.stringify(currentEditPath);
                    for (let key of nodeTypeMap.keys()) if (key.startsWith(prefix)) nodeTypeMap.delete(key);
                });
                editorDirty = false;
                currentEditPath = null;
                clearEditorStateInDB();
            } catch (e) { showToast('JSON 格式错误: ' + e.message); }
        }

        function clearEditor() { cmEditor.setValue(''); currentEditPath = null; editorDirty = false; clearEditorStateInDB(); }

        function tryEditNode(path) {
            if (editorDirty && !confirm('编辑器中有未推送更改，切换将丢失。确定？')) return false;
            return loadNodeToEditor(path);
        }

        // ----- IndexedDB 管理 -----
        const DB_NAME = 'SugarCubeEditorDB';
        const STORE_NAME = 'editorState';
        let db = null;

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 2);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => { db = request.result; resolve(db); };
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
                };
            });
        }

        async function saveStateToDB() {
            if (!db) return;
            const state = {
                base64: document.getElementById('base64Input').value,
                rootWrapper: rootWrapper,
                whiteListPaths: Array.from(whiteListPaths),
                blackListPaths: Array.from(blackListPaths),
                filterMode: filterMode,
                historyStack: historyStack,
                historyIndex: historyIndex,
                nodeTypeMap: Array.from(nodeTypeMap.entries()),
                expandedSet: Array.from(expandedSet),
                currentPath: currentPath,
                jsonpathMode: jsonpathMode,
                lastSearchTerm: lastSearchTerm,
                matchPaths: matchPaths,
                matchIndex: matchIndex,
            };
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            store.put(state, 'current');
            return tx.complete;
        }

        async function loadStateFromDB() {
            if (!db) return null;
            const tx = db.transaction(STORE_NAME, 'readonly');
            const store = tx.objectStore(STORE_NAME);
            return new Promise((resolve) => {
                const request = store.get('current');
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => resolve(null);
            });
        }

        async function saveEditorStateToDB() {
            if (!db) return;
            const editorState = {
                currentEditPath: currentEditPath,
                editorContent: cmEditor.getValue(),
            };
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            store.put(editorState, 'editor');
        }

        async function loadEditorStateFromDB() {
            if (!db) return null;
            const tx = db.transaction(STORE_NAME, 'readonly');
            const store = tx.objectStore(STORE_NAME);
            return new Promise((resolve) => {
                const request = store.get('editor');
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => resolve(null);
            });
        }

        async function clearEditorStateInDB() {
            if (!db) return;
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            store.delete('editor');
        }

        // 初始化DB并加载
        openDB().then(async () => {
            const saved = await loadStateFromDB();
            if (saved) {
                document.getElementById('base64Input').value = saved.base64 || '';
                rootWrapper = saved.rootWrapper || { root: {} };
                whiteListPaths = new Set(saved.whiteListPaths || []);
                blackListPaths = new Set(saved.blackListPaths || []);
                filterMode = saved.filterMode || 'none';
                historyStack = saved.historyStack || [];
                historyIndex = saved.historyIndex !== undefined ? saved.historyIndex : -1;
                nodeTypeMap = new Map(saved.nodeTypeMap || []);
                expandedSet = new Set(saved.expandedSet || []);
                currentPath = saved.currentPath || ['root'];
                jsonpathMode = saved.jsonpathMode || false;
                lastSearchTerm = saved.lastSearchTerm || '';
                matchPaths = saved.matchPaths || [];
                matchIndex = saved.matchIndex !== undefined ? saved.matchIndex : -1;
            }
            initCodeMirrors();
            const editorSaved = await loadEditorStateFromDB();
            if (editorSaved && editorSaved.currentEditPath) {
                currentEditPath = editorSaved.currentEditPath;
                cmEditor.setValue(editorSaved.editorContent);
                editorDirty = true;
            }
            fullRender();
            updateJsonpathToggle();
        }).catch(console.warn);

        // ----- 辅助函数 -----
        function getNodeByPath(path) {
            if (!Array.isArray(path) || path.length === 0) return { parent: null, key: null, value: rootWrapper };
            let value = rootWrapper;
            for (let i = 0; i < path.length - 1; i++) {
                const seg = path[i];
                if (value && typeof value === 'object' && seg in value) value = value[seg];
                else return { parent: null, key: null, value: undefined };
            }
            const lastKey = path[path.length - 1];
            if (path.length === 1) return { parent: rootWrapper, key: lastKey, value: rootWrapper[lastKey] };
            const parent = getNodeByPath(path.slice(0, -1)).value;
            return { parent, key: lastKey, value: parent ? parent[lastKey] : undefined };
        }

        function setValueByPath(path, newValue) {
            const { parent, key } = getNodeByPath(path);
            if (parent && typeof parent === 'object' && key !== null) { parent[key] = newValue; return true; }
            return false;
        }

        function arrayEquals(a, b) { return a.length === b.length && a.every((v,i)=> v===b[i]); }
        function cloneDeep(obj) { return JSON.parse(JSON.stringify(obj)); }

        function getNodeType(path, value) {
            const pathStr = JSON.stringify(path);
            if (nodeTypeMap.has(pathStr)) return nodeTypeMap.get(pathStr);
            if (value === null) return 'null';
            if (Array.isArray(value)) return 'array';
            if (typeof value === 'object') return 'object';
            return typeof value;
        }

        function scrollCurrentNodeIntoView() {
            requestAnimationFrame(() => {
                const container = document.getElementById('jsonTree');
                if (!container) return;
                const targetRow = Array.from(container.querySelectorAll('.node-row')).find(row => {
                    try { return arrayEquals(JSON.parse(row.dataset.path), currentPath); }
                    catch { return false; }
                });
                if (!targetRow) return;
                const containerRect = container.getBoundingClientRect();
                const targetRect = targetRow.getBoundingClientRect();
                container.scrollTo({
                    top: container.scrollTop + targetRect.top - containerRect.top - (container.clientHeight/2) + (targetRow.offsetHeight/2),
                    left: container.scrollLeft + targetRect.left - containerRect.left - (container.clientWidth/2) + (targetRow.offsetWidth/2),
                    behavior: 'smooth'
                });
            });
        }

        function showToast(message, duration = 2000) {
            const existing = document.querySelector('.toast-message');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), duration);
        }

        function fullRender() {
            renderTree();
            renderBreadcrumb();
            updateMatchCounter();
            updateFilterUI();
            updateCurrentNodeHighlight();
            scrollCurrentNodeIntoView();
            saveStateToDB();
        }

        function refreshLightUI() {
            renderBreadcrumb();
            updateMatchCounter();
            updateFilterUI();
            saveStateToDB();
        }

        function setCurrentPath(path) {
            if (!path) return;
            currentPath = path.slice();
            updateCurrentNodeHighlight();
            renderBreadcrumb();
            scrollCurrentNodeIntoView();
            saveStateToDB();
        }

        function updateCurrentNodeHighlight() {
            const rows = document.querySelectorAll('.node-row');
            rows.forEach(row => row.classList.remove('current-node'));
            const targetRow = Array.from(rows).find(row => {
                try { return arrayEquals(JSON.parse(row.dataset.path), currentPath); }
                catch { return false; }
            });
            if (targetRow) targetRow.classList.add('current-node');
        }

        function pushHistory() {
            const snapshot = cloneDeep(rootWrapper);
            if (historyIndex < historyStack.length - 1) historyStack = historyStack.slice(0, historyIndex + 1);
            historyStack.push(snapshot);
            if (historyStack.length > MAX_HISTORY) historyStack.shift();
            historyIndex = historyStack.length - 1;
            saveStateToDB();
        }

        function undo() {
            if (historyIndex > 0) { historyIndex--; rootWrapper = cloneDeep(historyStack[historyIndex]); fullRender(); saveStateToDB(); }
            else showToast('没有上一步');
        }

        function redo() {
            if (historyIndex < historyStack.length - 1) { historyIndex++; rootWrapper = cloneDeep(historyStack[historyIndex]); fullRender(); saveStateToDB(); }
            else showToast('没有下一步');
        }

        function modifyData(callback) { callback(); pushHistory(); fullRender(); }

        function renderTree() {
            const container = document.getElementById('jsonTree');
            container.innerHTML = '';
            const rootEl = renderNode('root', rootWrapper['root'], ['root'], 0);
            if (rootEl) container.appendChild(rootEl);
        }

        function renderNode(key, value, path, level) {
            const li = document.createElement('li');
            li.className = 'tree-node';
            const row = document.createElement('div');
            row.className = 'node-row' + (arrayEquals(path, currentPath) ? ' current-node' : '');
            row.dataset.path = JSON.stringify(path);

            const isCollapsible = value && typeof value === 'object';
            const toggleSpan = document.createElement('span');
            toggleSpan.className = 'toggle';
            if (isCollapsible) {
                const expanded = expandedSet.has(JSON.stringify(path));
                toggleSpan.textContent = expanded ? '▼' : '▶';
                toggleSpan.onclick = (e) => {
                    e.stopPropagation();
                    const strPath = JSON.stringify(path);
                    expandedSet.has(strPath) ? expandedSet.delete(strPath) : expandedSet.add(strPath);
                    fullRender();
                };
            } else toggleSpan.textContent = '  ';
            row.appendChild(toggleSpan);

            const keySpan = document.createElement('span');
            keySpan.className = 'key';
            keySpan.textContent = key;
            keySpan.onclick = (e) => { e.stopPropagation(); setCurrentPath(path); };
            row.appendChild(keySpan);
            row.appendChild(document.createElement('span')).className = 'colon';
            row.lastChild.textContent = ':';

            const currentType = getNodeType(path, value);
            const typeBadge = document.createElement('span');
            typeBadge.className = 'type-badge';
            typeBadge.textContent = currentType;
            row.appendChild(typeBadge);

            if (isCollapsible) {
                const summary = Array.isArray(value) ? `Array(${value.length})` : 'Object';
                const valSpan = document.createElement('span');
                valSpan.className = 'node-summary';
                valSpan.textContent = ` ${summary}`;
                valSpan.onclick = (e) => { e.stopPropagation(); setCurrentPath(path); };
                row.appendChild(valSpan);
            } else {
                const textSpan = document.createElement('span');
                textSpan.className = 'value-text';
                textSpan.textContent = (value === null) ? 'null' : String(value);
                textSpan.onclick = (e) => { e.stopPropagation(); setCurrentPath(path); };
                row.appendChild(textSpan);
            }

            li.appendChild(row);

            if (isCollapsible && expandedSet.has(JSON.stringify(path))) {
                const children = document.createElement('ul');
                if (Array.isArray(value)) {
                    value.forEach((item, idx) => {
                        children.appendChild(renderNode(idx.toString(), item, path.concat(idx.toString()), level+1));
                    });
                } else {
                    Object.entries(value).forEach(([k, v]) => {
                        children.appendChild(renderNode(k, v, path.concat(k), level+1));
                    });
                }
                li.appendChild(children);
            }
            return li;
        }

        // 面包屑：显示为 $ / root / state ...
        function renderBreadcrumb() {
            const bread = document.getElementById('breadcrumb');
            bread.innerHTML = '';
            for (let i = 0; i < currentPath.length; i++) {
                const part = currentPath[i];
                const display = (i === 0) ? '$' : part;
                const crumb = document.createElement('span');
                crumb.className = 'crumb-item';
                crumb.textContent = display;
                crumb.dataset.path = JSON.stringify(currentPath.slice(0, i + 1));
                crumb.onclick = (e) => {
                    const p = JSON.parse(e.target.dataset.path);
                    setCurrentPath(p);
                    // 如果目标节点是容器，自动展开
                    const nodeInfo = getNodeByPath(p);
                    if (nodeInfo.value && typeof nodeInfo.value === 'object') {
                        expandedSet.add(JSON.stringify(p));
                    }
                };
                bread.appendChild(crumb);
                if (i < currentPath.length - 1) {
                    bread.appendChild(document.createTextNode(' / '));
                }
            }
        }

        function updateFilterUI() {
            const toggleBtn = document.getElementById('toggleFilterModeBtn');
            toggleBtn.textContent = filterMode === 'none' ? '🔘 未启用' : (filterMode === 'whitelist' ? '⚪ 启用白名单' : '⚫ 启用黑名单');
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            if (filterMode === 'whitelist') document.getElementById('addWhitelistBtn').classList.add('active');
            if (filterMode === 'blacklist') document.getElementById('addBlacklistBtn').classList.add('active');
        }

        // 按钮绑定
        document.getElementById('newNodeBtn').onclick = () => {
            const raw = simpleEditor.getValue().trim();
            if (!raw) return showToast('请输入 JSON');
            let parsed;
            try { parsed = JSON.parse(raw); } catch { return showToast('无效 JSON'); }
            const nodeInfo = getNodeByPath(currentPath);
            if (!nodeInfo || nodeInfo.value === undefined) return showToast('当前节点无效');
            const target = nodeInfo.value;
            if (!target || typeof target !== 'object') return showToast('只能在对象或数组下插入新节点');

            // 修改逻辑：当当前节点为对象时，只能插入纯对象进行合并
            if (!Array.isArray(target)) { // 当前节点是对象
                if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
                    // 是纯对象，执行合并
                    modifyData(() => {
                        Object.assign(target, parsed);
                        expandedSet.add(JSON.stringify(currentPath));
                    });
                } else {
                    return showToast('当前节点为对象，只能插入对象（JSON 对象）进行合并');
                }
            } else { // 当前节点是数组
                modifyData(() => {
                    if (Array.isArray(parsed)) {
                        target.push(...parsed);
                    } else {
                        target.push(parsed);
                    }
                    expandedSet.add(JSON.stringify(currentPath));
                });
            }
            simpleEditor.setValue('');
        };

        document.getElementById('deleteNodeBtn').onclick = () => {
            if (arrayEquals(currentPath, ['root'])) return showToast('不能删除根节点');
            if (editorDirty && currentEditPath && arrayEquals(currentEditPath, currentPath) && !confirm('节点正在编辑且未推送，确定删除？')) return;
            modifyData(() => {
                const { parent, key } = getNodeByPath(currentPath);
                if (parent && key !== null) {
                    if (Array.isArray(parent)) parent.splice(Number(key), 1);
                    else delete parent[key];
                }
            });
        };

        // 帮助按钮已使用 title 属性，无需 onclick

        document.getElementById('editCurrentNodeBtn').onclick = () => tryEditNode(currentPath);
        document.getElementById('pushNodeBtn').onclick = pushEditorToTree;
        document.getElementById('clearEditorBtn').onclick = () => { if (!editorDirty || confirm('确定清空？未推送更改将丢失')) clearEditor(); };
        document.getElementById('cmUndoBtn').onclick = () => cmEditor.undo();
        document.getElementById('cmRedoBtn').onclick = () => cmEditor.redo();
        document.getElementById('cmFormatBtn').onclick = formatCode;

        function updateJsonpathToggle() {
            const btn = document.getElementById('jsonpathToggleBtn');
            btn.textContent = '$';
            btn.classList.toggle('active', jsonpathMode);
        }
        document.getElementById('jsonpathToggleBtn').onclick = () => {
            jsonpathMode = !jsonpathMode;
            updateJsonpathToggle();
            if (lastSearchTerm) search(lastSearchTerm);
        };

        // ----- 搜索核心 -----
        function search(term) {
            if (!term.trim()) { matchPaths = []; matchIndex = -1; fullRender(); return; }
            let matches = [];
            if (jsonpathMode) {
                try {
                    const pointers = JSONPath({ path: term, json: rootWrapper, resultType: 'pointer', preventEval: true });
                    matches = pointers.map(p => {
                        let parts = p.slice(1).split('/').map(part => part.replace(/~1/g, '/').replace(/~0/g, '~'));
                        return parts;
                    });
                } catch (e) { showToast('JSONPath 错误: ' + e.message); }
            } else {
                const lowerTerm = term.toLowerCase();
                function traverse(obj, path) {
                    if (!obj || typeof obj !== 'object') return;
                    if (Array.isArray(obj)) {
                        obj.forEach((item, idx) => {
                            const curPath = path.concat(idx.toString());
                            if (!isPathAllowed(curPath)) return;
                            if (idx.toString().toLowerCase().includes(lowerTerm)) matches.push(curPath);
                            if (item && typeof item === 'object') traverse(item, curPath);
                            else if (String(item).toLowerCase().includes(lowerTerm)) matches.push(curPath);
                        });
                    } else {
                        Object.entries(obj).forEach(([k, v]) => {
                            const curPath = path.concat(k);
                            if (!isPathAllowed(curPath)) return;
                            if (k.toLowerCase().includes(lowerTerm)) matches.push(curPath);
                            if (v && typeof v === 'object') traverse(v, curPath);
                            else if (String(v).toLowerCase().includes(lowerTerm)) matches.push(curPath);
                        });
                    }
                }
                traverse(rootWrapper.root, ['root']);
            }
            matchPaths = matches;
            matchIndex = matchPaths.length > 0 ? 0 : -1;
            if (matchIndex >= 0) jumpToMatch(matchIndex);
            else fullRender();
            updateMatchCounter();
        }

        function jumpToMatch(idx) {
            if (!matchPaths.length) return;
            matchIndex = idx;
            const path = matchPaths[idx];

            if (!getNodeByPath(path).value) {
                showToast('路径无效，可能已被删除');
                return;
            }

            const newExpanded = new Set();
            for (let i = 1; i <= path.length; i++) {
                const anc = path.slice(0, i);
                if (getNodeByPath(anc).value && typeof getNodeByPath(anc).value === 'object')
                    newExpanded.add(JSON.stringify(anc));
            }
            expandedSet = newExpanded;
            currentPath = path.slice();

            fullRender();
        }

        function updateMatchCounter() {
            document.getElementById('matchCounter').textContent = matchPaths.length ? `${matchIndex+1}/${matchPaths.length}` : '0/0';
        }

        function isPathAllowed(path) {
            if (filterMode === 'none') return true;
            if (filterMode === 'whitelist') {
                for (let i=1; i<=path.length; i++) if (whiteListPaths.has(JSON.stringify(path.slice(0,i)))) return true;
                return false;
            } else {
                for (let i=1; i<=path.length; i++) if (blackListPaths.has(JSON.stringify(path.slice(0,i)))) return false;
                return true;
            }
        }

        // 黑白名单操作
        function addToWhitelist() { const p = JSON.stringify(currentPath); blackListPaths.delete(p); whiteListPaths.add(p); showToast('已添加白名单'); updateFilterUI(); saveStateToDB(); }
        function addToBlacklist() { const p = JSON.stringify(currentPath); whiteListPaths.delete(p); blackListPaths.add(p); showToast('已添加黑名单'); updateFilterUI(); saveStateToDB(); }
        function toggleFilterMode() {
            filterMode = filterMode === 'none' ? 'whitelist' : filterMode === 'whitelist' ? 'blacklist' : 'none';
            showToast(`过滤模式: ${filterMode}`);
            updateFilterUI();
            if (lastSearchTerm) search(lastSearchTerm);
        }
        function clearCurrentFilter() {
            if (filterMode === 'whitelist') whiteListPaths.clear();
            else if (filterMode === 'blacklist') blackListPaths.clear();
            else { whiteListPaths.clear(); blackListPaths.clear(); }
            showToast('名单已清空');
            if (lastSearchTerm) search(lastSearchTerm); else fullRender();
        }

        // 解码/编码
        function decodeFromBase64() {
            const base64 = document.getElementById('base64Input').value.trim();
            if (!base64) return showToast('Base64 为空');
            try {
                const decoded = decodeSugarCubeSave(base64);
                modifyData(() => {
                    rootWrapper = { root: decoded };
                    expandedSet.clear(); whiteListPaths.clear(); blackListPaths.clear(); filterMode = 'none';
                    currentPath = ['root']; nodeTypeMap.clear();
                });
                showToast('解码成功');
            } catch (e) { showToast('解码失败: ' + e.message); }
        }

        function encodeAndCopy() {
            try {
                const base64 = encodeSugarCubeSave(rootWrapper.root);
                document.getElementById('base64Input').value = base64;
                navigator.clipboard.writeText(base64).then(() => showToast('编码已复制')).catch(() => showToast('编码成功，但复制失败'));
            } catch (e) { showToast('编码失败: ' + e.message); }
        }

        document.getElementById('pasteBase64Btn').onclick = () => {
            navigator.clipboard.readText().then(text => { document.getElementById('base64Input').value = text; decodeFromBase64(); })
                .catch(() => showToast('无法读取剪贴板'));
        };
        document.getElementById('filePicker').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => { document.getElementById('base64Input').value = ev.target.result; decodeFromBase64(); };
            reader.readAsText(file);
        });
        document.getElementById('copyBase64Btn').onclick = () => {
            navigator.clipboard.writeText(document.getElementById('base64Input').value).then(() => showToast('已复制')).catch(() => showToast('复制失败'));
        };
        document.getElementById('downloadBase64Btn').onclick = () => {
            const val = document.getElementById('base64Input').value;
            if (!val) return showToast('无内容');
            const blob = new Blob([val], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'sugarcube_save.txt';
            a.click();
            URL.revokeObjectURL(a.href);
        };

        document.getElementById('undoBtn').onclick = undo;
        document.getElementById('redoBtn').onclick = redo;
        document.getElementById('decodeFloatBtn').onclick = decodeFromBase64;
        document.getElementById('encodeFloatBtn').onclick = encodeAndCopy;
        document.getElementById('searchBtn').onclick = () => {
            lastSearchTerm = document.getElementById('searchInput').value;
            search(lastSearchTerm);
        };
        document.getElementById('prevMatchBtn').onclick = () => {
            if (matchPaths.length && matchIndex > 0) jumpToMatch(matchIndex-1);
            updateMatchCounter();
        };
        document.getElementById('nextMatchBtn').onclick = () => {
            if (matchPaths.length && matchIndex < matchPaths.length-1) jumpToMatch(matchIndex+1);
            updateMatchCounter();
        };

        document.getElementById('addWhitelistBtn').onclick = addToWhitelist;
        document.getElementById('addBlacklistBtn').onclick = addToBlacklist;
        document.getElementById('toggleFilterModeBtn').onclick = toggleFilterMode;
        document.getElementById('clearFilterBtn').onclick = clearCurrentFilter;
    </script>
</body>
</html>
