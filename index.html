<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍞 SugarCube 存档编辑器 · 树形面包屑</title>
    <!-- lz-string 核心库 -->
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f4f3f0;
            padding: 1.5rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .editor-container {
            max-width: 1300px;
            width: 100%;
            background: #fefcf7;
            border-radius: 28px;
            box-shadow: 0 25px 40px -12px rgba(40, 30, 10, 0.3);
            padding: 2rem 2rem 3rem 2rem;
            position: relative;
        }
        h1 {
            font-weight: 500;
            font-size: 2.2rem;
            letter-spacing: -0.5px;
            color: #3a2e28;
            margin-bottom: 1.5rem;
            border-left: 6px solid #b87c5a;
            padding-left: 1.3rem;
        }

        /* base64 行 */
        .base64-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-bottom: 0.8rem;
            align-items: center;
        }
        .btn {
            background: #eae3da;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #3a2e28;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            transition: 0.15s;
            border: 1px solid transparent;
        }
        .btn:hover {
            background: #d9cdbf;
            border-color: #c1a58b;
        }
        .btn-file {
            background: #dbd0c2;
            position: relative;
            display: inline-block;
        }
        .btn-file input {
            position: absolute;
            left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer;
        }
        .base64-textarea {
            width: 100%;
            padding: 1rem;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.85rem;
            background: #f6f3ef;
            border: 1px solid #d9cfc0;
            border-radius: 24px;
            margin-bottom: 1.8rem;
            resize: vertical;
            min-height: 100px;
            color: #2b221c;
            outline: none;
            transition: 0.1s;
            box-shadow: inset 2px 2px 6px rgba(0,0,0,0.02);
        }
        .base64-textarea:focus {
            border-color: #b87c5a;
            background: #fffcf8;
        }

        /* json功能区 */
        .new-node-bar {
            display: flex;
            align-items: center;
            margin: 0.5rem 0 0.2rem;
        }
        .new-node-bar .btn {
            background: #b6aa9a;
            color: #fefcf7;
            padding: 0.5rem 1.8rem;
            margin-right: 1rem;
            box-shadow: 0 4px 8px rgba(120, 80, 50, 0.15);
        }
        .new-node-textarea {
            width: 100%;
            padding: 0.8rem 1.2rem;
            font-family: 'Monaco', monospace;
            font-size: 0.8rem;
            background: #f3efe8;
            border: 1px solid #d1c3b2;
            border-radius: 36px;
            resize: vertical;
            min-height: 70px;
            margin: 0.2rem 0 1.4rem 0;
        }

        /* 搜索面板 */
        .search-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
            background: #ece5db;
            padding: 0.6rem 1.2rem;
            border-radius: 60px;
            margin: 1rem 0 0.8rem;
        }
        .search-input {
            flex: 3 1 200px;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            border: 1px solid #cfbfad;
            background: white;
            font-size: 0.9rem;
        }
        .search-btn {
            background: #cab89e;
            border: none;
            border-radius: 40px;
            padding: 0.6rem 1.4rem;
            font-weight: 600;
            color: #2e241d;
        }
        .match-indicator {
            background: #ddcfbe;
            padding: 0.2rem 1rem;
            border-radius: 36px;
            font-size: 0.9rem;
            font-weight: 500;
            min-width: 70px;
            text-align: center;
        }
        .nav-arrow {
            background: none;
            border: 1px solid #b29e88;
            font-size: 1.2rem;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            cursor: pointer;
        }

        /* 黑白名单工具栏 */
        .filter-toolbar {
            background: #e8dfd2;
            padding: 0.7rem 1.5rem;
            border-radius: 60px;
            margin: 0.5rem 0 1rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.8rem 1.2rem;
            font-size: 0.95rem;
        }
        .filter-label {
            font-weight: 500;
            color: #4f3f33;
        }
        .filter-btn {
            background: #dbcdbc;
            border: none;
            border-radius: 40px;
            padding: 0.4rem 1.2rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid #c5af99;
        }
        .filter-btn.active {
            background: #b87c5a;
            color: white;
            border-color: #9b6243;
        }
        .mode-toggle {
            background: #cbb59e;
            font-weight: 600;
            min-width: 130px;
        }
        .clear-btn {
            background: #ccb7a2;
        }

        /* 面包屑 */
        .breadcrumb {
            background: #e2d7cb;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            margin: 0.8rem 0 1rem;
            font-size: 0.95rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem 0.6rem;
            color: #4f3f33;
        }
        .crumb-item {
            cursor: pointer;
            padding: 0.1rem 0.5rem;
            border-radius: 30px;
            background: #f2ece3;
            transition: 0.1s;
        }
        .crumb-item:hover {
            background: #d4bfab;
        }

        /* json树 */
        .json-tree {
            background: #fbf9f5;
            border: 1px solid #ddd2c2;
            border-radius: 32px;
            padding: 1.5rem 1.2rem;
            overflow-x: auto;
            max-height: 500px;
            overflow-y: auto;
            box-shadow: inset 0 0 0 1px rgba(255,250,240,0.8);
            scroll-behavior: smooth; /* 平滑滚动 */
        }
        .tree-node {
            margin-left: 1.4rem;
            list-style: none;
        }
        .tree-node ul {
            padding-left: 1.4rem;
            margin: 0.2rem 0;
            list-style: none;
        }
        .node-row {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 0.2rem 0.1rem;
            border-radius: 30px;
            cursor: default;
        }
        .node-row.current-node {
            background: #efe4d7;
            outline: 1px solid #c9aa8b;
        }
        .toggle {
            width: 1.2rem;
            display: inline-block;
            cursor: pointer;
            font-size: 0.9rem;
            color: #8b6f58;
            user-select: none;
        }
        .key {
            font-weight: 600;
            color: #684e3a;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }
        .colon {
            margin-right: 4px;
        }
        .value-edit {
            background: transparent;
            border: 1px solid #d0bcab;
            border-radius: 30px;
            padding: 0.2rem 0.8rem;
            font-size: 0.85rem;
            font-family: 'Monaco', monospace;
            width: auto;
            min-width: 100px;
            max-width: 300px;
        }
        .value-edit:focus {
            background: white;
            border-color: #a16b48;
            outline: none;
        }
        .node-summary {
            color: #906f54;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .null-value { color: #9a887b; font-style: italic; }

        /* 悬浮解码按钮 (fixed) */
        .float-buttons {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            pointer-events: none;
            z-index: 1000;
        }
        .float-buttons .btn {
            pointer-events: auto;
            width: 4rem;
            height: 4rem;
            border-radius: 60px;
            font-size: 1.8rem;
            font-weight: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 18px -8px rgba(80, 50, 20, 0.5);
            border: none;
        }
        .btn-encode {
            background: #a77557;
            color: white;
        }
        .btn-decode {
            background: #d3b59b;
            color: #2b1e14;
        }

        /* Toast 提示 */
        .toast-message {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #2e241d;
            color: #f0e2d4;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-size: 0.95rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
            z-index: 2000;
            opacity: 0;
            animation: fadeinout 2s ease forwards;
            pointer-events: none;
            white-space: nowrap;
        }
        @keyframes fadeinout {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }

        /* 响应式微调 */
        @media (max-width: 600px) {
            body { padding: 0.8rem; }
            .editor-container { padding: 1.2rem 1rem 4.5rem; }
            .float-buttons { right: 1rem; bottom: 1rem; gap: 0.8rem; }
            .float-buttons .btn { width: 3.2rem; height: 3.2rem; font-size: 1.5rem; }
            .toast-message { font-size: 0.8rem; padding: 0.5rem 1.2rem; white-space: normal; }
        }
    </style>
</head>
<body>
    <div class="editor-container">
        <h1>🍞 SugarCube 存档 · 树洞</h1>

        <!-- base64 功能区 -->
        <div class="base64-toolbar">
            <button class="btn" id="copyBase64Btn">复制</button>
            <button class="btn" id="pasteBase64Btn">粘贴</button>
            <span class="btn btn-file">
                选择文件
                <input type="file" id="filePicker" accept="*/*">
            </span>
            <button class="btn" id="downloadBase64Btn">下载txt</button>
        </div>
        <textarea id="base64Input" class="base64-textarea" placeholder="Base64 暗文（lz-string压缩）" spellcheck="false"></textarea>

        <!-- json 新建区域 -->
        <div class="new-node-bar">
            <button class="btn" id="newNodeBtn">➕ 新建节点</button>
        </div>
        <textarea id="newNodeTextarea" class="new-node-textarea" placeholder='输入合法 JSON 插入到当前节点下 (对象: {"key":"value"} / 数组: [value] …)'></textarea>

        <!-- 搜索面板 -->
        <div class="search-panel">
            <input type="text" id="searchInput" class="search-input" placeholder='搜索键/值 (不区分大小写)'>
            <button class="search-btn" id="searchBtn">搜索</button>
            <span class="match-indicator" id="matchCounter">0/0</span>
            <button class="nav-arrow" id="prevMatchBtn">◀</button>
            <button class="nav-arrow" id="nextMatchBtn">▶</button>
        </div>

        <!-- 黑白名单工具栏 -->
        <div class="filter-toolbar">
            <span class="filter-label">📌 添加当前节点到搜索</span>
            <button class="filter-btn" id="addWhitelistBtn">⚪ 白名单</button>
            <button class="filter-btn" id="addBlacklistBtn">⚫ 黑名单</button>
            <button class="filter-btn mode-toggle" id="toggleFilterModeBtn">🔘 未启用</button>
            <button class="filter-btn clear-btn" id="clearFilterBtn">🗑️ 清空当前启用名单</button>
        </div>

        <!-- 面包屑 -->
        <div class="breadcrumb" id="breadcrumb"></div>

        <!-- json 树区域 -->
        <div id="jsonTree" class="json-tree"></div>

        <!-- 悬浮解/编按钮 -->
        <div class="float-buttons">
            <button class="btn btn-decode" id="decodeFloatBtn">解</button>
            <button class="btn btn-encode" id="encodeFloatBtn">编</button>
        </div>
    </div>

    <script>
        (function() {
            // ---------- 定义 SugarCube 专用编解码函数 ----------
            function decodeSugarCubeSave(base64String) {
                const trimmed = base64String.trim();
                const jsonString = LZString.decompressFromBase64(trimmed);
                if (!jsonString) throw new Error('无效的 SugarCube 存档 Base64 格式');
                return JSON.parse(jsonString);
            }

            function encodeSugarCubeSave(saveObject) {
                const jsonString = JSON.stringify(saveObject);
                return LZString.compressToBase64(jsonString);
            }

            // ---------- 全局变量 ----------
            let rootWrapper = { root: { "example": "点击解码或输入base64" } };
            let currentPath = ['root'];
            let expandedSet = new Set();

            // 搜索结果
            let matchPaths = [];
            let matchIndex = -1;
            let lastSearchTerm = '';

            // 黑白名单相关
            let whiteListPaths = new Set();
            let blackListPaths = new Set();
            let filterMode = 'none';

            // ---------- Toast 提示 (优雅降级) ----------
            function showToast(message, duration = 2000) {
                const existing = document.querySelector('.toast-message');
                if (existing) existing.remove();

                const toast = document.createElement('div');
                toast.className = 'toast-message';
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => {
                    if (toast.parentNode) toast.remove();
                }, duration);
            }

            // ---------- 辅助函数 ----------
            function getNodeByPath(path) {
                if (!Array.isArray(path) || path.length === 0) return { parent: null, key: null, value: rootWrapper };
                let value = rootWrapper;
                for (let i = 0; i < path.length - 1; i++) {
                    const seg = path[i];
                    if (value && typeof value === 'object' && seg in value) value = value[seg];
                    else return { parent: null, key: null, value: undefined };
                }
                const lastKey = path[path.length - 1];
                if (path.length === 1) return { parent: rootWrapper, key: lastKey, value: rootWrapper[lastKey] };
                const parent = getNodeByPath(path.slice(0, -1)).value;
                return { parent, key: lastKey, value: parent ? parent[lastKey] : undefined };
            }

            function setValueByPath(path, newValue) {
                if (!Array.isArray(path) || path.length === 0) return false;
                const { parent, key } = getNodeByPath(path);
                if (parent && typeof parent === 'object' && key !== null && key !== undefined) {
                    parent[key] = newValue;
                    return true;
                }
                return false;
            }

            function cloneDeep(obj) {
                return JSON.parse(JSON.stringify(obj));
            }

            function arrayEquals(a, b) {
                return a.length === b.length && a.every((v,i)=> v===b[i]);
            }

            function tryParseJson(str) {
                if (str === 'null') return null;
                if (str === 'true') return true;
                if (str === 'false') return false;
                if (/^-?\d+(\.\d+)?$/.test(str)) return Number(str);
                try {
                    return JSON.parse(str);
                } catch {
                    return str;
                }
            }

            // ---------- 滚动当前节点到视野中央 ----------
            function scrollCurrentNodeIntoView() {
                // 使用 requestAnimationFrame 确保 DOM 已完全渲染
                requestAnimationFrame(() => {
                    const rows = document.querySelectorAll('.node-row');
                    const targetRow = Array.from(rows).find(row => {
                        const pathAttr = row.getAttribute('data-path');
                        if (!pathAttr) return false;
                        try {
                            const path = JSON.parse(pathAttr);
                            return arrayEquals(path, currentPath);
                        } catch {
                            return false;
                        }
                    });
                    if (targetRow) {
                        targetRow.scrollIntoView({ block: 'center', behavior: 'smooth' });
                    }
                });
            }

            // 刷新UI (重绘树 + 面包屑 + 滚动)
            function refreshUI() {
                renderTree();
                renderBreadcrumb();
                updateMatchCounter();
                updateFilterUI();
                scrollCurrentNodeIntoView();  // 新增：节点跳转后自动居中
            }

            // 标记当前节点
            function setCurrentPath(path) {
                if (!path) return;
                currentPath = path.slice();
                refreshUI();
            }

            // ---------- 树渲染 ----------
            function renderTree() {
                const container = document.getElementById('jsonTree');
                container.innerHTML = ''; 
                const rootEl = renderNode('root', rootWrapper['root'], ['root'], 0);
                if (rootEl) container.appendChild(rootEl);
            }

            function renderNode(key, value, path, level) {
                const li = document.createElement('li');
                li.className = 'tree-node';
                const row = document.createElement('div');
                row.className = 'node-row' + (arrayEquals(path, currentPath) ? ' current-node' : '');
                row.dataset.path = JSON.stringify(path);

                const isCollapsible = value && typeof value === 'object';
                const toggleSpan = document.createElement('span');
                toggleSpan.className = 'toggle';
                if (isCollapsible) {
                    const expanded = expandedSet.has(JSON.stringify(path));
                    toggleSpan.textContent = expanded ? '▼' : '▶';
                    toggleSpan.onclick = (e) => {
                        e.stopPropagation();
                        const strPath = JSON.stringify(path);
                        if (expandedSet.has(strPath)) expandedSet.delete(strPath);
                        else expandedSet.add(strPath);
                        renderTree();
                        renderBreadcrumb();
                    };
                } else {
                    toggleSpan.textContent = '  ';
                }
                row.appendChild(toggleSpan);

                const keySpan = document.createElement('span');
                keySpan.className = 'key';
                keySpan.textContent = key;
                keySpan.onclick = (e) => {
                    e.stopPropagation();
                    setCurrentPath(path);
                };
                row.appendChild(keySpan);
                row.appendChild(document.createElement('span')).className = 'colon';
                row.lastChild.textContent = ':';

                if (isCollapsible) {
                    const summary = Array.isArray(value) ? `Array(${value.length})` : 'Object';
                    const valSpan = document.createElement('span');
                    valSpan.className = 'node-summary';
                    valSpan.textContent = ` ${summary}`;
                    valSpan.onclick = (e) => {
                        e.stopPropagation();
                        setCurrentPath(path);
                    };
                    row.appendChild(valSpan);
                } else {
                    if (value === null) {
                        const nullSpan = document.createElement('span');
                        nullSpan.className = 'null-value';
                        nullSpan.textContent = 'null';
                        nullSpan.onclick = (e) => {
                            e.stopPropagation();
                            setCurrentPath(path);
                        };
                        row.appendChild(nullSpan);
                    } else {
                        const input = document.createElement('input');
                        input.type = 'text';
                        input.className = 'value-edit';
                        input.value = (typeof value === 'string' || typeof value === 'number' || typeof value === 'boolean') ? String(value) : JSON.stringify(value);
                        input.dataset.path = JSON.stringify(path);
                        input.addEventListener('click', (e) => e.stopPropagation());
                        input.addEventListener('change', function(e) {
                            const raw = e.target.value;
                            const parsed = tryParseJson(raw);
                            const targetPath = JSON.parse(e.target.dataset.path);
                            rootWrapper = cloneDeep(rootWrapper);
                            setValueByPath(targetPath, parsed);
                            refreshUI();
                        });
                        row.appendChild(input);
                    }
                }

                li.appendChild(row);

                if (isCollapsible && expandedSet.has(JSON.stringify(path))) {
                    const children = document.createElement('ul');
                    if (Array.isArray(value)) {
                        value.forEach((item, idx) => {
                            const childPath = path.concat(idx.toString());
                            children.appendChild(renderNode(idx.toString(), item, childPath, level + 1));
                        });
                    } else if (value && typeof value === 'object') {
                        Object.entries(value).forEach(([k, v]) => {
                            const childPath = path.concat(k);
                            children.appendChild(renderNode(k, v, childPath, level + 1));
                        });
                    }
                    li.appendChild(children);
                }
                return li;
            }

            // 面包屑
            function renderBreadcrumb() {
                const bread = document.getElementById('breadcrumb');
                bread.innerHTML = '';
                let acc = [];
                for (let i = 0; i < currentPath.length; i++) {
                    acc.push(currentPath[i]);
                    const part = currentPath[i];
                    const crumb = document.createElement('span');
                    crumb.className = 'crumb-item';
                    crumb.textContent = part;
                    crumb.dataset.path = JSON.stringify(acc.slice());
                    crumb.onclick = (e) => {
                        const p = JSON.parse(e.target.dataset.path);
                        setCurrentPath(p);
                        const nodeInfo = getNodeByPath(p);
                        if (nodeInfo.value && typeof nodeInfo.value === 'object') {
                            expandedSet.add(JSON.stringify(p));
                        }
                        refreshUI();
                    };
                    bread.appendChild(crumb);
                    if (i < currentPath.length - 1) bread.appendChild(document.createTextNode(' / '));
                }
            }

            // ---------- 黑白名单逻辑 ----------
            function updateFilterUI() {
                const toggleBtn = document.getElementById('toggleFilterModeBtn');
                let text = '🔘 未启用';
                if (filterMode === 'whitelist') text = '⚪ 启用白名单';
                else if (filterMode === 'blacklist') text = '⚫ 启用黑名单';
                toggleBtn.textContent = text;

                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                if (filterMode === 'whitelist') document.getElementById('addWhitelistBtn').classList.add('active');
                if (filterMode === 'blacklist') document.getElementById('addBlacklistBtn').classList.add('active');
            }

            function addToWhitelist() {
                const pathStr = JSON.stringify(currentPath);
                if (blackListPaths.has(pathStr)) blackListPaths.delete(pathStr);
                whiteListPaths.add(pathStr);
                showToast(`已添加 [${currentPath.join('/')}] 到白名单`);
                updateFilterUI();
            }

            function addToBlacklist() {
                const pathStr = JSON.stringify(currentPath);
                if (whiteListPaths.has(pathStr)) whiteListPaths.delete(pathStr);
                blackListPaths.add(pathStr);
                showToast(`已添加 [${currentPath.join('/')}] 到黑名单`);
                updateFilterUI();
            }

            function toggleFilterMode() {
                if (filterMode === 'none') filterMode = 'whitelist';
                else if (filterMode === 'whitelist') filterMode = 'blacklist';
                else filterMode = 'none';
                showToast(`搜索过滤模式: ${filterMode === 'none' ? '未启用' : (filterMode === 'whitelist' ? '白名单' : '黑名单')}`);
                updateFilterUI();
                if (lastSearchTerm) search(lastSearchTerm);
            }

            function clearCurrentFilter() {
                if (filterMode === 'whitelist') {
                    whiteListPaths.clear();
                    showToast('白名单已清空');
                } else if (filterMode === 'blacklist') {
                    blackListPaths.clear();
                    showToast('黑名单已清空');
                } else {
                    whiteListPaths.clear();
                    blackListPaths.clear();
                    showToast('所有名单已清空');
                }
                if (lastSearchTerm) search(lastSearchTerm);
                else refreshUI();
            }

            function isPathAllowed(path) {
                if (filterMode === 'none') return true;
                const pathStr = JSON.stringify(path);
                if (filterMode === 'whitelist') {
                    for (let i = 1; i <= path.length; i++) {
                        const ancestorStr = JSON.stringify(path.slice(0, i));
                        if (whiteListPaths.has(ancestorStr)) return true;
                    }
                    return false;
                } else if (filterMode === 'blacklist') {
                    for (let i = 1; i <= path.length; i++) {
                        const ancestorStr = JSON.stringify(path.slice(0, i));
                        if (blackListPaths.has(ancestorStr)) return false;
                    }
                    return true;
                }
                return true;
            }

            // ---------- 搜索 ----------
            function search(term) {
                if (!term.trim()) { matchPaths = []; matchIndex = -1; refreshUI(); return; }
                const lowerTerm = term.toLowerCase();
                const matches = [];

                function traverse(obj, path) {
                    if (!obj || typeof obj !== 'object') return;

                    if (Array.isArray(obj)) {
                        obj.forEach((item, idx) => {
                            const currentPath = path.concat(idx.toString());
                            if (!isPathAllowed(currentPath)) return;
                            if (idx.toString().toLowerCase().includes(lowerTerm)) matches.push(currentPath.slice());
                            if (item && typeof item === 'object') traverse(item, currentPath);
                            else {
                                const strVal = String(item).toLowerCase();
                                if (strVal.includes(lowerTerm)) matches.push(currentPath.slice());
                            }
                        });
                    } else {
                        Object.entries(obj).forEach(([k, v]) => {
                            const currentPath = path.concat(k);
                            if (!isPathAllowed(currentPath)) return;
                            if (k.toLowerCase().includes(lowerTerm)) matches.push(currentPath.slice());
                            if (v && typeof v === 'object') traverse(v, currentPath);
                            else {
                                const strVal = String(v).toLowerCase();
                                if (strVal.includes(lowerTerm)) matches.push(currentPath.slice());
                            }
                        });
                    }
                }

                if (rootWrapper.root && typeof rootWrapper.root === 'object') {
                    traverse(rootWrapper.root, ['root']);
                }

                matchPaths = matches;
                matchIndex = matchPaths.length > 0 ? 0 : -1;
                if (matchIndex >= 0) jumpToMatch(matchIndex);
                else refreshUI();
                updateMatchCounter();
            }

            function jumpToMatch(idx) {
                if (!matchPaths.length || idx < 0 || idx >= matchPaths.length) return;
                matchIndex = idx;
                const path = matchPaths[idx];
                expandedSet.clear();
                for (let i = 1; i <= path.length; i++) {
                    const anc = path.slice(0, i);
                    const val = getNodeByPath(anc).value;
                    if (val && typeof val === 'object') expandedSet.add(JSON.stringify(anc));
                }
                setCurrentPath(path);
            }

            function updateMatchCounter() {
                const span = document.getElementById('matchCounter');
                span.textContent = matchPaths.length ? `${matchIndex+1}/${matchPaths.length}` : '0/0';
            }

            // ---------- 新建节点 ----------
            function createNewNodeFromText() {
                const textarea = document.getElementById('newNodeTextarea');
                const raw = textarea.value.trim();
                if (!raw) return showToast('请输入 JSON', 1500);
                let parsed;
                try {
                    parsed = JSON.parse(raw);
                } catch {
                    return showToast('无效 JSON', 1500);
                }
                const nodeInfo = getNodeByPath(currentPath);
                if (!nodeInfo || nodeInfo.value === undefined) return showToast('当前节点无效', 1500);
                const target = nodeInfo.value;
                if (!target || typeof target !== 'object') return showToast('只能在对象或数组下插入新节点', 1500);

                rootWrapper = cloneDeep(rootWrapper);
                const actualParent = getNodeByPath(currentPath).value;
                if (Array.isArray(actualParent)) {
                    if (Array.isArray(parsed)) actualParent.push(...parsed);
                    else actualParent.push(parsed);
                } else if (actualParent && typeof actualParent === 'object') {
                    if (parsed && typeof parsed === 'object') {
                        Object.assign(actualParent, parsed);
                    } else {
                        let baseKey = 'newKey';
                        let counter = 1;
                        while (baseKey in actualParent) baseKey = `newKey${counter++}`;
                        actualParent[baseKey] = parsed;
                    }
                }
                expandedSet.add(JSON.stringify(currentPath));
                refreshUI();
                textarea.value = '';
                showToast('节点已添加');
            }

            // ---------- Base64 解码 ----------
            function decodeFromBase64() {
                const base64 = document.getElementById('base64Input').value.trim();
                if (!base64) return showToast('Base64 为空', 1500);
                try {
                    const decoded = decodeSugarCubeSave(base64);
                    rootWrapper = { root: decoded };
                    expandedSet.clear();
                    whiteListPaths.clear();
                    blackListPaths.clear();
                    filterMode = 'none';
                    currentPath = ['root'];
                    refreshUI();
                    showToast('解码成功');
                } catch (e) {
                    showToast('解码失败: ' + e.message, 2500);
                }
            }

            // ---------- 编码并复制 (优雅降级) ----------
            function encodeAndCopy() {
                try {
                    if (!rootWrapper.root) throw new Error('无存档数据');
                    const base64 = encodeSugarCubeSave(rootWrapper.root);
                    document.getElementById('base64Input').value = base64;
                    navigator.clipboard.writeText(base64).then(() => {
                        showToast('编码已复制到剪贴板');
                    }).catch(() => {
                        showToast('编码成功，但自动复制失败，请手动复制', 2500);
                    });
                } catch (e) {
                    showToast('编码失败: ' + e.message, 2500);
                }
            }

            // ---------- 文件选择 ----------
            document.getElementById('filePicker').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    document.getElementById('base64Input').value = ev.target.result;
                    showToast(`已加载文件: ${file.name}`);
                };
                reader.readAsText(file);
            });

            // 剪贴板粘贴 (优雅降级)
            document.getElementById('pasteBase64Btn').onclick = () => {
                navigator.clipboard.readText().then(text => {
                    document.getElementById('base64Input').value = text;
                    showToast('已粘贴');
                }).catch(() => showToast('无法读取剪贴板，请手动粘贴', 2000));
            };
            document.getElementById('copyBase64Btn').onclick = () => {
                const val = document.getElementById('base64Input').value;
                navigator.clipboard.writeText(val).then(() => showToast('已复制')).catch(() => showToast('复制失败，请手动复制', 2000));
            };
            document.getElementById('downloadBase64Btn').onclick = () => {
                const val = document.getElementById('base64Input').value;
                if (!val) return showToast('没有可下载的内容', 1500);
                try {
                    const blob = new Blob([val], {type: 'text/plain'});
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = 'sugarcube_save.txt';
                    a.click();
                    URL.revokeObjectURL(a.href);
                    showToast('下载已开始');
                } catch (e) {
                    showToast('下载失败: ' + e.message, 2000);
                }
            };

            // 按钮绑定
            document.getElementById('decodeFloatBtn').onclick = decodeFromBase64;
            document.getElementById('encodeFloatBtn').onclick = encodeAndCopy;
            document.getElementById('newNodeBtn').onclick = createNewNodeFromText;
            document.getElementById('searchBtn').onclick = () => {
                const term = document.getElementById('searchInput').value;
                lastSearchTerm = term;
                search(term);
            };
            document.getElementById('prevMatchBtn').onclick = () => {
                if (matchPaths.length && matchIndex > 0) jumpToMatch(matchIndex - 1);
                updateMatchCounter();
            };
            document.getElementById('nextMatchBtn').onclick = () => {
                if (matchPaths.length && matchIndex < matchPaths.length-1) jumpToMatch(matchIndex + 1);
                updateMatchCounter();
            };

            // 黑白名单按钮事件
            document.getElementById('addWhitelistBtn').onclick = addToWhitelist;
            document.getElementById('addBlacklistBtn').onclick = addToBlacklist;
            document.getElementById('toggleFilterModeBtn').onclick = toggleFilterMode;
            document.getElementById('clearFilterBtn').onclick = clearCurrentFilter;

            // 初始渲染
            refreshUI();
        })();
    </script>
</body>
</html>
